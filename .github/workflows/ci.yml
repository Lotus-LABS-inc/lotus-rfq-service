name: ci

on:
  push:
  pull_request:

jobs:
  phase3a-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotus_rfq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lotus_rfq_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lotus_rfq_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lotus_rfq_test
      REDIS_URL: redis://localhost:6379
      TEST_REDIS_URL: redis://localhost:6379
      LOG_LEVEL: info

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create artifact directory
        run: mkdir -p artifacts/phase3a

      - name: Run Phase 3A stress proof
        shell: bash
        run: |
          set -o pipefail
          npm run stress:phase3a 2>&1 | tee artifacts/phase3a/stress-phase3a.log

      - name: Run Phase 3A rollout validation
        shell: bash
        run: |
          set -o pipefail
          npx vitest run test/integration/phase3a-rollout-validation.integration.test.ts --maxWorkers=1 2>&1 | tee artifacts/phase3a/phase3a-rollout-validation.log

      - name: Upload Phase 3A artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase3a-proof-artifacts
          path: artifacts/phase3a/
