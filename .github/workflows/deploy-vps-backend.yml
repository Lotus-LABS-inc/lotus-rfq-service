name: Deploy Backend to VPS

on:
  push:
    branches:
      - staging
      - main
    paths:
      - ".github/workflows/deploy-vps-backend.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "scripts/**"
      - "sql/migrations/**"
      - "tests/**"
      - "test/**"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations before restart"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: vps-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} backend
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_PORT: ${{ vars.VPS_PORT }}
      VPS_BACKEND_DIR: ${{ vars.VPS_BACKEND_DIR }}
      VPS_ENV_FILE: ${{ vars.VPS_ENV_FILE }}
      VPS_SYSTEMD_SERVICES: ${{ vars.VPS_SYSTEMD_SERVICES }}
    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "Missing secret VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing secret VPS_USER"; exit 1; }
          test -n "$VPS_SSH_PRIVATE_KEY" || { echo "Missing secret VPS_SSH_PRIVATE_KEY"; exit 1; }
          if [ -z "${RUN_MIGRATIONS:-}" ]; then
            RUN_MIGRATIONS="true"
            echo "RUN_MIGRATIONS=$RUN_MIGRATIONS" >> "$GITHUB_ENV"
          fi
          if [ -z "${VPS_PORT:-}" ]; then
            VPS_PORT="22"
            echo "VPS_PORT=$VPS_PORT" >> "$GITHUB_ENV"
          fi
          if [ -z "${VPS_BACKEND_DIR:-}" ]; then
            if [ "$DEPLOY_BRANCH" = "main" ]; then
              VPS_BACKEND_DIR="/opt/lotus/lotus-rfq-service"
            else
              VPS_BACKEND_DIR="/opt/lotus/lotus-rfq-service-staging"
            fi
            echo "VPS_BACKEND_DIR=$VPS_BACKEND_DIR" >> "$GITHUB_ENV"
          fi
          if [ -z "${VPS_ENV_FILE:-}" ]; then
            if [ "$DEPLOY_BRANCH" = "main" ]; then
              VPS_ENV_FILE="/etc/lotus/prod/backend.env"
            else
              VPS_ENV_FILE="/etc/lotus/staging/backend.env"
            fi
            echo "VPS_ENV_FILE=$VPS_ENV_FILE" >> "$GITHUB_ENV"
          fi
          if [ -z "${VPS_SYSTEMD_SERVICES:-}" ]; then
            if [ "$DEPLOY_BRANCH" = "main" ]; then
              VPS_SYSTEMD_SERVICES="lotus-prod-backend lotus-prod-read lotus-prod-orderbook lotus-prod-worker lotus-prod-polymarket-relay lotus-prod-predictfun-relay"
            else
              VPS_SYSTEMD_SERVICES="lotus-staging-backend lotus-staging-read lotus-staging-orderbook lotus-staging-worker lotus-staging-polymarket-relay lotus-staging-predictfun-relay"
            fi
            echo "VPS_SYSTEMD_SERVICES=$VPS_SYSTEMD_SERVICES" >> "$GITHUB_ENV"
          fi
          test -n "$VPS_SYSTEMD_SERVICES" || { echo "Missing variable VPS_SYSTEMD_SERVICES"; exit 1; }

      - name: Install SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/lotus_vps_deploy
          chmod 600 ~/.ssh/lotus_vps_deploy
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on VPS
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lotus_vps_deploy -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "DEPLOY_BRANCH='$DEPLOY_BRANCH' VPS_BACKEND_DIR='$VPS_BACKEND_DIR' VPS_ENV_FILE='$VPS_ENV_FILE' VPS_SYSTEMD_SERVICES='$VPS_SYSTEMD_SERVICES' RUN_MIGRATIONS='$RUN_MIGRATIONS' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$VPS_BACKEND_DIR"

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

          npm ci
          npm run build

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            if [ -n "${VPS_ENV_FILE:-}" ] && sudo test -r "$VPS_ENV_FILE"; then
              sudo -E bash -lc "set -a; . '$VPS_ENV_FILE'; set +a; cd '$VPS_BACKEND_DIR'; npm run db:migrate:supabase"
            else
              npm run db:migrate:supabase
            fi
          fi

          for service in $VPS_SYSTEMD_SERVICES; do
            sudo systemctl restart "$service"
            sudo systemctl --no-pager --full status "$service" >/dev/null
          done

          sudo mkdir -p "$VPS_BACKEND_DIR/artifacts/runtime"
          sudo chown -R "$(id -u):$(id -g)" "$VPS_BACKEND_DIR/artifacts"

          if [ "$DEPLOY_BRANCH" = "main" ]; then
            SMOKE_TARGET="production"
          else
            SMOKE_TARGET="staging"
          fi

          for attempt in 1 2 3 4 5; do
            if npm run report:vps-runtime-smoke -- "$SMOKE_TARGET"; then
              exit 0
            fi
            echo "VPS runtime smoke failed on attempt $attempt; retrying after service warmup..."
            sleep 5
          done

          npm run report:vps-runtime-smoke -- "$SMOKE_TARGET"
          REMOTE
