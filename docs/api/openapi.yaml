              items: { $ref: "#/components/schemas/AdminFundingReadinessRow" }
            checkerDisabledOrNotConfigured:
              type: array
              items: { $ref: "#/components/schemas/AdminFundingReadinessRow" }
            failed:
              type: array
              items: { $ref: "#/components/schemas/AdminFundingReadinessRow" }
            unknown:
              type: array
              items: { $ref: "#/components/schemas/AdminFundingReadinessRow" }
        rows:
