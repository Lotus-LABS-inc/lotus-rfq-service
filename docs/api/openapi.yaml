openapi: 3.0.3
info:
  title: Lotus RFQ Service API
  version: 0.1.0
  description: |
    Static API contract for the Lotus RFQ service.

    This spec separates implemented callable APIs from planned or unregistered APIs.
    Do not call endpoints marked `x-lotus-callable: false`.

    Execution safety notes:
    - RFQ accept may trigger execution only if the lane is operator-approved.
    - Matcher-ready lanes are not executable authority.
    - Execution may fail closed.
    - Settlement verification may delay final completion.
    - Ghost-fill protection can change final state.
    - Accounting updates only after settlement/finality.
    - Execution-scope token is not authority by itself.

    Funding safety notes:
    - Funding APIs are planned only unless marked implemented.
    - LiFi route quote does not equal ready-to-trade.
    - Execution preflight requires READY_TO_TRADE.
    - Venue capability matrix decides target chain/token.
    - Predict.fun is not PredictIt.
servers:
  - url: http://localhost:3000
    description: Local dev server
tags:
  - name: Health
  - name: Metrics
  - name: RFQ
  - name: LP
  - name: Resolution Risk
  - name: Admin Lanes
  - name: Admin Execution Venues
  - name: Admin Execution Control
  - name: Admin Risk
  - name: Admin SOR
  - name: Admin Control Plane
  - name: Admin Simulation
  - name: Admin Qualification
  - name: Admin Replay
  - name: Admin Internal Engines
  - name: Admin Compatibility
  - name: Planned Funding
  - name: Unregistered APIs
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200":
