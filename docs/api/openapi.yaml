openapi: 3.0.3
info:
  title: Lotus RFQ Service API
  version: 0.1.0
  description: |
    Static API contract for the Lotus RFQ service.

    This spec separates implemented callable APIs from planned or unregistered APIs.
    Do not call endpoints marked `x-lotus-callable: false`.

    Execution safety notes:
    - RFQ accept may trigger execution only if the lane is operator-approved.
    - Matcher-ready lanes are not executable authority.
    - Execution may fail closed.
    - Settlement verification may delay final completion.
    - Ghost-fill protection can change final state.
    - Accounting updates only after settlement/finality.
    - Execution-scope token is not authority by itself.

    Funding safety notes:
    - Funding v0 is non-custodial funding preparation: Lotus returns route instructions and tracks user-broadcast transactions; users sign with their own wallets.
    - Lotus does not custody, sign, broadcast user wallet transactions, pool funds, or internally allocate user balances in v0.
    - LI.FI route quote does not equal ready-to-trade.
    - Execution preflight requires READY_TO_TRADE.
    - Funding Capability Matrix decides target chain/token/destination for capital movement.
    - Market Capability Matrix remains separate and decides market lane routeability/operator approval.
    - Withdrawal v0 is also non-custodial: Lotus records withdrawal intents, route previews, and user-broadcast tx hashes only.
    - Withdrawal quote/submit endpoints do not call live venue withdrawal APIs, do not sign, and do not broadcast transactions.
    - Predict.fun is not PredictIt.
servers:
  - url: http://localhost:3000
    description: Local dev server
