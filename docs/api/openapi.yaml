          additionalProperties: { type: integer }
        countsByReadinessStatus:
          type: object
          additionalProperties: { type: integer }
        countsByCheckerMode:
          type: object
          additionalProperties: { type: integer }
        countsByRouteProvider:
          type: object
          additionalProperties: { type: integer }
        staleAgeBuckets:
          type: object
          additionalProperties: { type: integer }
        blockedRows:
