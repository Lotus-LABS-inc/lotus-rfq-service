openapi: 3.0.3
info:
  title: Lotus RFQ Service API
  version: 0.1.0
  description: |
    Static API contract for the Lotus RFQ service.

    This spec separates implemented callable APIs from planned or unregistered APIs.
    Do not call endpoints marked `x-lotus-callable: false`.

    Execution safety notes:
    - RFQ accept may trigger execution only if the lane is operator-approved.
    - Matcher-ready lanes are not executable authority.
    - Execution may fail closed.
    - Settlement verification may delay final completion.
    - Ghost-fill protection can change final state.
    - Accounting updates only after settlement/finality.
    - Execution-scope token is not authority by itself.

    Funding safety notes:
    - Funding v0 is non-custodial funding preparation: Lotus returns route instructions and tracks user-broadcast transactions; users sign with their own wallets.
    - Lotus does not custody, sign, broadcast user wallet transactions, pool funds, or internally allocate user balances in v0.
    - LI.FI route quote does not equal ready-to-trade.
    - Execution preflight requires READY_TO_TRADE.
    - Funding Capability Matrix decides target chain/token/destination for capital movement.
    - Market Capability Matrix remains separate and decides market lane routeability/operator approval.
    - Withdrawal v0 is also non-custodial: Lotus records withdrawal intents, route previews, and user-broadcast tx hashes only.
    - Withdrawal quote/submit endpoints do not call live venue withdrawal APIs, do not sign, and do not broadcast transactions.
    - Predict.fun is not PredictIt.
servers:
  - url: http://localhost:3000
    description: Local dev server
tags:
  - name: Health
  - name: Metrics
  - name: Authentication
  - name: Markets
  - name: RFQ
  - name: Execution
  - name: Notifications
  - name: LP
  - name: Resolution Risk
  - name: Admin Lanes
  - name: Admin Execution Venues
  - name: Admin Auth
  - name: Admin Ops
  - name: Admin Monetization
  - name: Admin Schema Map
  - name: Admin Execution Control
  - name: Admin Risk
  - name: Admin SOR
  - name: Admin Control Plane
  - name: Admin Simulation
  - name: Admin Qualification
  - name: Admin Replay
  - name: Admin Internal Engines
  - name: Admin Compatibility
  - name: Funding
  - name: Internal Funding
  - name: Admin Funding Readiness
  - name: Planned Funding
  - name: Unregistered APIs
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /metrics:
    get:
      tags: [Metrics]
      summary: Prometheus metrics.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: medium
      responses:
        "200":
          description: Prometheus text metrics.
          content:
            text/plain:
              schema:
                type: string
  /auth/turnkey/exchange:
    post:
      tags: [Authentication]
      summary: Exchange a verified Turnkey session for a Lotus user JWT.
      description: Accepts Turnkey session identity fields and returns a Lotus bearer token for user-facing API calls. Raw Turnkey session tokens must not be logged or displayed.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public-turnkey-session
      x-lotus-side-effects: issues-user-jwt
      x-lotus-danger: medium
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [turnkeySessionToken, turnkeyUserId, turnkeyOrganizationId]
              properties:
                turnkeySessionToken: { type: string }
                turnkeyUserId: { type: string }
                turnkeyOrganizationId: { type: string }
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /markets/categories:
    get:
      tags: [Markets]
      summary: List approved user-facing market categories.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketCategories" }
  /markets:
    get:
      tags: [Markets]
      summary: List approved user-facing canonical markets.
      description: Returns canonical market metadata and frontend-safe sanitized media URLs from approved venue metadata. Raw venue payloads and provider secrets are never returned.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      parameters:
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000 }
      responses:
        "200": { $ref: "#/components/responses/MarketList" }
        "400": { $ref: "#/components/responses/Error" }
  /events:
    get:
      tags: [Markets]
      summary: List approved user-facing event groups.
      description: Also mounted as /event and /market-events for frontend compatibility.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      parameters:
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000 }
      responses:
        "200": { $ref: "#/components/responses/MarketEventList" }
        "400": { $ref: "#/components/responses/Error" }
  /events/{eventId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Markets]
      summary: Read one approved event group.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketEventDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /events/{eventId}/markets:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Markets]
      summary: List approved child markets under an event group.
      description: Also mounted as /event/{eventId}/markets and /market-events/{eventId}/markets.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/EventMarkets" }
        "404": { $ref: "#/components/responses/Error" }
  /markets/{marketId}:
    parameters:
      - name: marketId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Markets]
      summary: Read one approved canonical market.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /markets/{marketId}/outcomes:
    parameters:
      - name: marketId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Markets]
      summary: List normalized outcomes for one approved canonical market.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketOutcomes" }
        "404": { $ref: "#/components/responses/Error" }
  /markets/{marketId}/orderbook:
    parameters:
      - name: marketId
        in: path
        required: true
        schema: { type: string }
      - name: outcomeId
        in: query
        required: false
        schema: { type: string }
      - name: venue
        in: query
        required: false
        schema: { type: string }
      - name: depth
        in: query
        required: false
        schema: { type: integer, minimum: 1, maximum: 50 }
    get:
      tags: [Markets]
      summary: Read sanitized live orderbook depth for one canonical market.
      description: Uses Lotus backend venue quote readers only. Does not expose raw provider payloads, provider secrets, or Predexon-derived data.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: live-venue-read
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketOrderbook" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /markets/{marketId}/chart:
    parameters:
      - name: marketId
        in: path
        required: true
        schema: { type: string }
      - name: outcomeId
        in: query
        required: false
        schema: { type: string }
      - name: timeframe
        in: query
        required: false
        schema: { type: string, enum: [1H, 6H, 1D, 1W, 1M, ALL] }
    get:
      tags: [Markets]
      summary: Read Lotus live market chart points for one canonical market.
      description: Returns live midpoint observations accumulated from backend orderbook reads. Older timeframes may be accumulating; no historical data is fabricated.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: live-venue-read
      x-lotus-danger: low
      responses:
        "200": { $ref: "#/components/responses/MarketChart" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /rfq:
    post:
      tags: [RFQ]
      summary: Create an RFQ.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: creates-rfq
      x-lotus-danger: medium
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRFQRequest"
      responses:
        "201":
          description: RFQ session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFQResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /rfq/{id}/execution-scope-token:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      tags: [RFQ]
      summary: Create a short-lived execution-scope token for an RFQ.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: creates-scope-token
      x-lotus-danger: high
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionScopeTokenRequest"
      responses:
        "201":
          description: Scope token created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionScopeTokenResponse"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /rfq/{id}/accept:
    parameters:
      - $ref: "#/components/parameters/Id"
    post:
      tags: [RFQ]
      summary: Accept an RFQ and potentially start fail-closed execution.
      description: |
        Requires valid RFQ state, quote id, lane authority, and execution-scope token where required.
        This can trigger execution, but only approved lanes can execute. Settlement/finality may delay final completion.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: submits-execution
      x-lotus-danger: critical
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptRFQRequest"
      responses:
        "202":
          description: Execution plan accepted or queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptRFQResponse"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /rfq/{id}/executions/{executionId}/status:
    parameters:
      - $ref: "#/components/parameters/Id"
      - $ref: "#/components/parameters/ExecutionId"
    get:
      tags: [RFQ]
      summary: Get frontend-safe execution status for an RFQ execution.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Execution status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionStatusResponse"
        "404":
          $ref: "#/components/responses/Error"
  /execution/orders/preview:
    post:
      tags: [Execution]
      summary: Preview a backend-owned execution order.
      description: Creates a V1 execution order from the existing quote/readiness path. The response drives the one-click Place flow; required user signatures are returned only after Place.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: write
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionOrderPreviewRequest"
      responses:
        "201":
          description: Execution order preview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/orders/{orderId}/place:
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Execution]
      summary: Place a backend-owned execution order.
      description: Revalidates quote/readiness. If signing is needed, returns NEEDS_SIGNATURE; otherwise submits through the existing signed-bundle path. Duplicate Place calls are idempotent.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: write
      x-lotus-danger: high
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Order state after Place.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "202":
          description: Order submitted or filled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/orders/{orderId}/signatures:
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Execution]
      summary: Submit signatures and let backend submit the order.
      description: Accepts frontend-signed payloads for an order in NEEDS_SIGNATURE, then automatically submits through the existing signed-bundle path. The frontend should not call submit-signed-bundle in the V1 flow.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: write
      x-lotus-danger: high
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionOrderSignaturesRequest"
      responses:
        "200":
          description: Order state after signature processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "202":
          description: Order submitted or filled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/orders/{orderId}/status:
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Execution]
      summary: Read canonical V1 execution order status.
      description: Refreshes through existing signed execution status/fill reconciliation where possible, then returns the frontend-safe V1 order state.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: read-refresh
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current order state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionOrderResponse"
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/positions:
    get:
      tags: [Execution]
      summary: Read verified execution positions for the authenticated user.
      description: Optional market/outcome filters return a selected position set; omitting both returns user-wide verified positions. User-wide reads default to cached display marks to avoid page-load venue fanout; selected market/outcome reads default to live marks. These positions are backend-verified and must not be inferred client-side.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: marketId
          in: query
          required: false
          schema: { type: string }
        - name: outcomeId
          in: query
          required: false
          schema: { type: string }
        - name: venue
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
        - name: markMode
          in: query
          required: false
          description: Use cached display marks for broad/fast reads, or live quote marks for focused views.
          schema:
            type: string
            enum: [cached, live]
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /execution/portfolio/summary:
    get:
      tags: [Execution]
      summary: Read verified portfolio summary with cache-first display marks.
      description: Defaults to cached display marks so login/sidebar loads do not fan out to live venue quote providers. Pass markMode=live for an explicit live mark attempt. Positions remain present when marks are unavailable; mark fields are null with markFreshness=unavailable and a safe blocker.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: markMode
          in: query
          required: false
          description: Use cached display marks for broad/fast reads, or live quote marks for focused views.
          schema:
            type: string
            enum: [cached, live]
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "401": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/portfolio/timeseries:
    get:
      tags: [Execution]
      summary: Read portfolio mark-to-market time-series snapshot data.
      description: Returns backend-generated current MTM snapshot points. Defaults to cached display marks so page loads do not fan out to live venue quote providers. Pass markMode=live for an explicit live mark attempt. historyAvailable is false until persisted historical portfolio snapshots exist; clients must not fabricate historical PnL.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [1D, 7D, 30D, 90D, ALL]
        - name: markMode
          in: query
          required: false
          description: Use cached display marks for broad/fast reads, or live quote marks for focused views.
          schema:
            type: string
            enum: [cached, live]
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/history:
    get:
      tags: [Execution]
      summary: Read authenticated user's signed-bundle execution history.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRY_RUN_VERIFIED, SUBMITTED, PARTIAL, FILLED, FAILED]
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: cursor
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /execution/open-orders:
    get:
      tags: [Execution]
      summary: Read authenticated user's open signed-bundle orders.
      description: Lists non-dry-run signed-bundle executions in SUBMITTED or PARTIAL status. Limit-order creation/list/cancel is a separate later contract.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: cursor
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /execution/{executionId}/receipt:
    parameters:
      - $ref: "#/components/parameters/ExecutionId"
    get:
      tags: [Execution]
      summary: Read sanitized execution receipt.
      description: Returns route, leg, fill, settlement, and timestamp fields safe for user display. Raw provider payloads, secrets, auth headers, and signer material are excluded.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/GenericObject" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /notifications:
    get:
      tags: [Notifications]
      summary: Read persistent notifications for the authenticated user.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: cursor
          in: query
          required: false
          schema: { type: string, format: date-time }
