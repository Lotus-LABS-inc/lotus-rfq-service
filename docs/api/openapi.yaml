      summary: Quote non-custodial withdrawal route legs.
      description: Creates a frontend-safe withdrawal preview using Lotus withdrawal v0 scaffolding. It fails closed when venue withdrawal capability is disabled, source venue-ready balance is insufficient, destination wallet is invalid, capability state is unknown, or the venue is classified as AUTO_RESOLUTION_ONLY without an approved bridge-back path. Limitless beta support is limited to an explicitly enabled user-signed Base USDC to Solana USDC bridge-back route; its partner-managed backend withdrawal path is not wired to this endpoint.
