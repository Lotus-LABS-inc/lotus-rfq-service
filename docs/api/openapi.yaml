        "401": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /user/venue-accounts/predict_fun/complete-auth:
    post:
      tags: [User]
      summary: Complete Predict.fun account linking.
      description: Accepts a Turnkey-signed Predict.fun auth message, exchanges it server-side for a temporary Predict token, reads the connected account, and persists only safe public venue-account metadata. The Predict token is never returned or stored.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-venue-account
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictFunCompleteAccountAuthRequest"
      responses:
        "200": { $ref: "#/components/responses/UserVenueAccount" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /user/withdrawal-wallets/evm:
    put:
