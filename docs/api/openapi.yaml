        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /admin/auth/request-login-link:
    post:
      tags: [Admin Auth]
      summary: Request a self-service one-time admin magic login link.
      description: |
        Public login endpoint for the admin frontend. The response is always generic for syntactically valid email requests and never reveals whether the email belongs to an admin member.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public-login
      x-lotus-side-effects: may-send-admin-login-link
      x-lotus-danger: high
