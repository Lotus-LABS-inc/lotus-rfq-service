    UserVenueAccountSignatureRequest:
      type: object
      additionalProperties: false
      required: [venue, requestType, signer, message, venueAccount]
      properties:
        venue:
          type: string
          enum: [PREDICT_FUN, LIMITLESS, OPINION, POLYMARKET, MYRIAD]
        requestType:
          type: string
          enum: [PREDICT_FUN_AUTH_MESSAGE, LIMITLESS_PARTNER_ACCOUNT_OWNERSHIP_MESSAGE, ERC20_ALLOWANCE_APPROVAL, OPINION_ENABLE_TRADING_SAFE_TX]
        signer:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
        message:
          type: string
          description: Dynamic venue auth message or Safe transaction hash for frontend Turnkey signing. This is not a token or secret.
        venueAccount:
          $ref: "#/components/schemas/UserVenueAccount"
        typedData:
          type: object
          additionalProperties: true
          description: Frontend-safe EIP-712 typed data for requests such as Opinion enable-trading Safe transactions.
        safeTxHash:
          type: string
          description: Frontend-safe Opinion Safe transaction hash to sign and echo during completion.
        safeTx:
          type: object
          additionalProperties: true
          description: Redacted frontend-safe Opinion Safe transaction summary.
    CompleteUserVenueAccountSetupBatchRequest:
      type: object
      additionalProperties: false
      properties:
        predictFun:
          $ref: "#/components/schemas/PredictFunCompleteAccountAuthRequest"
        limitless:
          $ref: "#/components/schemas/LimitlessCompletePartnerAccountAuthRequest"
        opinion:
          $ref: "#/components/schemas/OpinionCompleteEnableTradingRequest"
    PredictFunAccountAuthMessageResponse:
      type: object
      additionalProperties: false
      required: [venue, signer, message, venueAccount]
      properties:
        venue:
          type: string
          enum: [PREDICT_FUN]
        signer:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
          description: Public Turnkey EVM wallet address that must sign the Predict.fun auth message.
        message:
          type: string
          description: Dynamic Predict.fun auth message to sign. This is not a token or secret.
        venueAccount:
          $ref: "#/components/schemas/UserVenueAccount"
    PredictFunCompleteAccountAuthRequest:
      type: object
      additionalProperties: false
      required: [signer, signature, message]
      properties:
        signer:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          description: Signature produced by the user's Turnkey EVM wallet over the Predict.fun auth message.
        message:
          type: string
          description: Exact Predict.fun auth message returned by the auth-message endpoint.
    LimitlessCompletePartnerAccountAuthRequest:
      type: object
      additionalProperties: false
      required: [signer, signature, message]
      properties:
        signer:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          description: Signature produced by the user's Turnkey EVM wallet over the Limitless partner-account ownership message.
        message:
          type: string
          description: Exact Limitless ownership message returned by setup-batch.
    OpinionCompleteEnableTradingRequest:
      type: object
      additionalProperties: false
      required: [signer, signature, safeTxHash]
      properties:
        signer:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
        signature:
          type: string
          pattern: "^0x[a-fA-F0-9]{130}$"
          description: Signature produced by the user's Turnkey EVM wallet over the Opinion Safe EIP-712 enable-trading transaction.
        safeTxHash:
          type: string
          description: Exact Opinion Safe transaction hash returned by setup-batch.
    EnsureUserVenueAccountRequest:
      type: object
      additionalProperties: false
      properties:
        venueAccountId:
          type: string
          description: Public venue account id returned by the venue after account setup.
        venueAccountAddress:
          type: string
          description: Public Safe, smart-wallet, OAuth wallet, EOA, or proxy address associated with the venue account.
        venueAccountType:
          type: string
          enum: [SAFE, SMART_WALLET, OAUTH_ACCOUNT, EOA, PROXY_ACCOUNT, DEPOSIT_WALLET]
    UpsertEvmWithdrawalWalletRequest:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
          description: EVM-compatible wallet address for receiving withdrawals such as Predict.fun BSC USDT.
        label:
          type: string
          maxLength: 80
    WithdrawalStatus:
      type: string
      enum:
        - WITHDRAWAL_CREATED
        - WITHDRAWAL_QUOTED
        - USER_SIGNATURE_REQUIRED
        - USER_SIGNED
        - WITHDRAWAL_SUBMITTED
        - PARTIALLY_WITHDRAWING
        - WITHDRAWING
        - PARTIALLY_COMPLETED
        - COMPLETED
        - PARTIALLY_FAILED
        - FAILED
        - CANCELLED
        - RETRY_REQUIRED
    WithdrawalLegStatus:
      type: string
      enum:
        - WITHDRAWAL_LEG_CREATED
        - WITHDRAWAL_LEG_QUOTED
        - WITHDRAWAL_LEG_SIGNATURE_REQUIRED
        - WITHDRAWAL_LEG_SUBMITTED
        - VENUE_RELEASE_PENDING
        - DESTINATION_PENDING
        - DESTINATION_RECEIVED
        - WITHDRAWAL_LEG_COMPLETED
        - WITHDRAWAL_LEG_FAILED
        - WITHDRAWAL_LEG_RETRY_REQUIRED
    CreateWithdrawalIntentRequest:
      type: object
      required: [token, amount, destinationChain, destinationWalletAddress, idempotencyKey, sources]
      additionalProperties: false
      properties:
        token: { type: string, example: USDC }
        amount: { type: string, example: "100" }
        destinationChain: { type: string, example: POLYGON }
        destinationWalletAddress:
          type: string
          description: User-controlled destination wallet. Lotus validates format but does not custody or broadcast.
        idempotencyKey: { type: string }
        sources:
          type: array
          minItems: 1
          items:
            type: object
            required: [sourceVenue]
            additionalProperties: false
            properties:
              sourceVenue: { $ref: "#/components/schemas/Venue" }
              sourceAmount: { type: string }
              sourcePercentage: { type: number, minimum: 0, maximum: 100 }
    SubmitWithdrawalRouteLegRequest:
      type: object
      required: [withdrawalRouteLegId, txHash]
      additionalProperties: false
      properties:
        withdrawalRouteLegId: { type: string }
        txHash:
          type: string
          description: User-broadcast transaction hash. Backend records only; it does not broadcast.
    WithdrawalSource:
      type: object
      additionalProperties: true
      properties:
        withdrawalSourceId: { type: string }
        withdrawalIntentId: { type: string }
        sourceVenue: { $ref: "#/components/schemas/Venue" }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        sourcePercentage: { type: number, nullable: true }
        status: { $ref: "#/components/schemas/WithdrawalLegStatus" }
    WithdrawalRouteLeg:
      type: object
      additionalProperties: true
      properties:
        withdrawalRouteLegId: { type: string }
        withdrawalIntentId: { type: string }
        withdrawalSourceId: { type: string }
        sourceVenue: { $ref: "#/components/schemas/Venue" }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        destinationChain: { type: string }
        destinationWalletAddress: { type: string }
        destinationAmountEstimate: { type: string }
        routeProvider: { type: string, enum: [LOTUS_WITHDRAWAL_V0] }
        routeQuote:
          type: object
          additionalProperties: true
          description: Frontend-safe withdrawal preview. It must not contain provider secrets or live venue withdrawal internals.
        providerStatus:
          type: object
          additionalProperties: true
          description: Sanitized provider status metadata. Limitless bridge-back rows may include provider=LIFI, mode=LIMITLESS_BRIDGE_BACK, source/destination chain and token, partnerManagedWithdrawalCalled=false, and completionPersisted=false. Venue EVM bridge-back rows may include provider=LIFI, mode=VENUE_EVM_BRIDGE_BACK, sourceWalletProvider=TURNKEY or EXTERNAL_EVM, sourceWalletAddress, requiresPriorVenueRelease=true, backendBroadcast=false, and completionPersisted=false. Polymarket Bridge sandbox rows may include provider=POLYMARKET_BRIDGE, mode=SANDBOX_DRY_RUN, bridgeAddressPresent, status, completionPersisted=false, and warnings. Predict.fun user-wallet dry-run rows may include provider=PREDICT_FUN_USER_WALLET, mode=USER_WALLET_DRY_RUN, walletModel=PRIVY_ZERODEV, destinationWalletProfileRequired=true, evmWithdrawalWalletPresent, instructionsUrl, completionPersisted=false, and warnings such as "Add an EVM-compatible wallet to receive BSC USDT withdrawals." Raw provider payloads, API keys, auth headers, private keys, wallet seeds, Privy secrets, ZeroDev signer material, DB URLs, and live withdrawal internals must not be returned.
        txHashes:
          type: array
          items: { type: string }
        venueReleaseStatus: { type: string }
        destinationStatus: { type: string }
        status: { $ref: "#/components/schemas/WithdrawalLegStatus" }
    PolymarketBridgeWithdrawalPreview:
      type: object
      additionalProperties: false
      description: Optional frontend-safe Polymarket Bridge sandbox preview. It is available only when disabled-by-default Bridge sandbox wiring is explicitly enabled and does not represent live execution or completion evidence.
      properties:
        provider: { type: string, enum: [POLYMARKET_BRIDGE] }
        mode: { type: string, enum: [SANDBOX_DRY_RUN] }
        bridgeAddressPresent: { type: boolean }
        bridgeAddress:
          type: string
          description: User-action address returned by the Bridge prepare flow. It is not a Lotus custody address and is returned only as frontend-safe instruction metadata.
        destinationChain: { type: string }
        destinationToken: { type: string }
        destinationAddress: { type: string }
        amount: { type: string }
        estimatedFees: { type: string }
        estimatedTimeSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
        warnings:
          type: array
          items: { type: string }
        completionPersisted:
          type: boolean
          enum: [false]
    PredictFunUserWalletWithdrawalPreview:
      type: object
      additionalProperties: false
      description: Optional frontend-safe Predict.fun user-wallet dry-run preview. It is available only when disabled-by-default Predict.fun adapter wiring is explicitly enabled and does not represent backend signing, backend broadcast, live venue mutation, or completion evidence.
      properties:
        provider: { type: string, enum: [PREDICT_FUN_USER_WALLET] }
        mode: { type: string, enum: [USER_WALLET_DRY_RUN] }
        walletModel: { type: string, enum: [PRIVY_ZERODEV] }
        instructionsUrl: { type: string }
        destinationWalletProfileRequired: { type: boolean }
        evmWithdrawalWalletPresent: { type: boolean }
        destinationChain: { type: string }
        destinationToken: { type: string }
        destinationAddress: { type: string }
        amount: { type: string }
        estimatedFees: { type: string }
        estimatedTimeSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
        warnings:
          type: array
          items: { type: string }
        completionPersisted:
          type: boolean
          enum: [false]
    LimitlessBridgeBackWithdrawalPreview:
      type: object
      additionalProperties: false
      description: Optional frontend-safe Limitless beta bridge-back preview. It represents a user-signed LI.FI bridge from Base USDC to Solana USDC and never calls Limitless partner-managed withdrawal APIs.
      properties:
        provider: { type: string, enum: [LIFI] }
        mode: { type: string, enum: [LIMITLESS_BRIDGE_BACK] }
        sourceChain: { type: string }
        sourceToken: { type: string }
        destinationChain: { type: string }
        destinationToken: { type: string }
        destinationAddress: { type: string }
        amount: { type: string }
        estimatedFees: { type: string }
        estimatedTimeSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
        partnerManagedWithdrawalCalled:
          type: boolean
          enum: [false]
        completionPersisted:
          type: boolean
          enum: [false]
    WithdrawalIntentResponse:
      type: object
      additionalProperties: true
      properties:
        withdrawalIntentId: { type: string }
        currentStatus: { $ref: "#/components/schemas/WithdrawalStatus" }
        token: { type: string }
        amount: { type: string }
        destinationChain: { type: string }
        destinationWalletAddress: { type: string }
        routePreview:
          type: object
          additionalProperties: true
          properties:
            polymarketBridge:
              $ref: "#/components/schemas/PolymarketBridgeWithdrawalPreview"
            limitlessBridgeBack:
              $ref: "#/components/schemas/LimitlessBridgeBackWithdrawalPreview"
            predictFunUserWallet:
              $ref: "#/components/schemas/PredictFunUserWalletWithdrawalPreview"
        totalEstimatedFees: { type: string }
        totalEstimatedTimeSeconds: { type: integer }
        sources:
          type: array
          items: { $ref: "#/components/schemas/WithdrawalSource" }
        routeLegs:
          type: array
          items: { $ref: "#/components/schemas/WithdrawalRouteLeg" }
        reconciliations:
          type: array
          items:
            type: object
            additionalProperties: true
        userSafeMessage: { type: string }
    FundingCheckerMode:
      type: string
      enum: [DISABLED, STUB, LIVE_READ, NOT_CONFIGURED]
    FundingReadinessStatus:
      type: string
      enum: [UNKNOWN, DESTINATION_NOT_CONFIRMED, VENUE_CREDIT_PENDING, READY_TO_TRADE, FAILED]
    AdminFundingReadinessRow:
