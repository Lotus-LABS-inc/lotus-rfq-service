        - aggregateFundingStatus
        - routeLegStatus
        - bridgeStatus
        - destinationStatus
        - venueCreditStatus
        - readinessStatus
        - readyToTrade
        - usableBalanceObserved
        - requiredAmount
        - checkerMode
        - checkerSource
        - lastCheckedAt
        - reasonNotReady
        - txHashes
        - auditEventIds
        - createdAt
        - updatedAt
