      tags: [User]
      summary: Read user withdrawal destination wallets.
      description: Returns frontend-safe public withdrawal destination wallet metadata for the authenticated user. Lotus never stores private keys, seed phrases, Privy secrets, ZeroDev signer material, or wallet auth tokens.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/UserWithdrawalWallets" }
        "401": { $ref: "#/components/responses/Error" }
  /user/wallets:
    get:
      tags: [User]
      summary: Read user funding wallet metadata.
      description: Returns frontend-safe public wallet metadata for Turnkey or external wallets. It never returns private keys, seed phrases, export bundles, Turnkey auth material, or signer credentials.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/UserWallets" }
        "401": { $ref: "#/components/responses/Error" }
  /user/wallets/ensure-defaults:
    post:
      tags: [User]
      summary: Ensure default Turnkey Solana and EVM wallets exist.
      description: Idempotently provisions or returns user-controlled exportable Turnkey wallets. Lotus stores public metadata only and does not sign, broadcast, or export keys.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-wallet
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/UserWallets" }
        "401": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /user/withdrawal-wallets/evm:
    put:
      tags: [User]
      summary: Add or replace the user's EVM withdrawal wallet.
      description: Stores only a public EVM address and optional label. Predict.fun BSC USDT withdrawals should require this user-controlled wallet before frontend submission.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-withdrawal-wallet
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEvmWithdrawalWalletRequest"
      responses:
        "200": { $ref: "#/components/responses/UserWithdrawalWallet" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /funding/withdrawals:
    post:
      tags: [Funding]
      summary: Create a split-capable withdrawal intent.
      description: Creates a non-custodial withdrawal intent from venue-ready capital. Lotus does not custody, sign, broadcast, call live venue withdrawal APIs, or mutate funding readiness records.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: funding-withdrawal-intent
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalIntentRequest"
      responses:
        "201": { $ref: "#/components/responses/WithdrawalIntent" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /funding/withdrawals/{id}:
    parameters: [{ $ref: "#/components/parameters/Id" }]
    get:
      tags: [Funding]
      summary: Read an owned withdrawal intent.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/WithdrawalIntent" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /funding/withdrawals/{id}/quote:
    parameters: [{ $ref: "#/components/parameters/Id" }]
    post:
      tags: [Funding]
      summary: Quote non-custodial withdrawal route legs.
      description: Creates a frontend-safe withdrawal preview using Lotus withdrawal v0 scaffolding. It fails closed when venue withdrawal capability is disabled, source venue-ready balance is insufficient, destination wallet is invalid, capability state is unknown, or the venue is classified as AUTO_RESOLUTION_ONLY without an approved bridge-back path. Limitless beta support is limited to an explicitly enabled user-signed Base USDC to Solana USDC bridge-back route; its partner-managed backend withdrawal path is not wired to this endpoint.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: funding-withdrawal-intent
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/WithdrawalIntent" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /funding/withdrawals/{id}/submit:
    parameters: [{ $ref: "#/components/parameters/Id" }]
    post:
      tags: [Funding]
      summary: Record a user-broadcast withdrawal transaction hash.
      description: Backend records the tx hash after the user signs/broadcasts. This does not submit a transaction, call a venue withdrawal API, or move funds from Lotus custody.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: funding-withdrawal-intent
      x-lotus-danger: high
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitWithdrawalRouteLegRequest"
      responses:
        "202": { $ref: "#/components/responses/WithdrawalIntent" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /funding/withdrawals/{id}/status:
    parameters: [{ $ref: "#/components/parameters/Id" }]
    get:
      tags: [Funding]
      summary: Read frontend-safe aggregate and per-leg withdrawal status.
      description: Status read is non-custodial and does not run live venue withdrawal mutation.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/WithdrawalIntent" }
        "404": { $ref: "#/components/responses/Error" }
  /funding/venues/capabilities:
    get:
      tags: [Funding]
      summary: Read frontend-safe venue funding capability matrix.
      description: Response redacts deposit addresses and provider secrets; it only exposes whether required server-side config exists. This Funding Capability Matrix is separate from market lane capability/operator approval.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Venue capability matrix.
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: array
                    items: { $ref: "#/components/schemas/VenueCapability" }
  /internal/polymarket/funding-balance:
    get:
      tags: [Internal Funding]
      summary: Internal read-only Polymarket usable funding balance.
      description: Server-side only endpoint used by Lotus funding readiness checks. It reads Polymarket CLOB collateral balance/allowance and returns only the safe usableBalance contract. It does not move funds, submit orders, persist readiness, or expose raw provider internals.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: internal
      x-lotus-side-effects: none
      x-lotus-danger: high
      parameters:
        - name: userId
          in: query
          required: true
          schema: { type: string }
        - name: fundingIntentId
          in: query
          required: true
          schema: { type: string }
        - name: routeLegId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Safe Polymarket usable balance response.
          content:
            application/json:
              schema:
                type: object
                required: [usableBalance]
                properties:
                  usableBalance: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /admin/funding/readiness:
    get:
      tags: [Admin Funding Readiness]
      summary: List persisted funding readiness for operator review.
      description: Read-only admin surface over Funding Flow v0 state. It does not call LI.FI, move funds, run live venue checks, or mark funds ready to trade.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/AdminFundingReadinessList" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /admin/funding/readiness/summary:
    get:
      tags: [Admin Funding Readiness]
      summary: Export an operator-safe Funding Flow v0 readiness summary.
      description: Read-only summary over persisted readiness rows. It does not call LI.FI, move funds, run live venue checks, or mark funds ready to trade. CANCELLED funding intents are retained in detailed readiness lists for audit history, but excluded from active summary counts and blocker rows.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/AdminFundingReadinessSummary" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /admin/funding/readiness/{fundingIntentId}:
    parameters:
      - name: fundingIntentId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Admin Funding Readiness]
      summary: Read persisted funding readiness rows for one funding intent.
      description: Returns one row per target/route leg for the funding intent. Split funding can therefore return multiple rows.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/AdminFundingReadinessList" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /admin/funding/readiness/user/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Admin Funding Readiness]
      summary: List persisted funding readiness rows for one user.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/AdminFundingReadinessList" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /admin/funding/readiness/venue/{venue}:
    parameters:
      - name: venue
        in: path
        required: true
        schema: { $ref: "#/components/schemas/Venue" }
    get:
      tags: [Admin Funding Readiness]
      summary: List persisted funding readiness rows for one venue.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/AdminFundingReadinessList" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /admin/funding/intents/{id}:
    parameters: [{ $ref: "#/components/parameters/Id" }]
    get:
      tags: [Planned Funding]
      summary: Planned admin funding intent read.
      x-lotus-status: planned
      x-lotus-callable: false
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      responses:
        "501": { description: Planned only; not implemented. }
  /admin/funding/ledger:
    get:
      tags: [Planned Funding]
      summary: Planned admin funding ledger read.
      x-lotus-status: planned
      x-lotus-callable: false
      x-lotus-auth: admin
      x-lotus-side-effects: none
      x-lotus-danger: medium
      responses:
        "501": { description: Planned only; not implemented. }

  /docs/schema-index:
    get:
      tags: [Unregistered APIs]
      summary: Documentation-only schema index; not a runtime endpoint.
      description: References shared schemas so Swagger Editor shows them as part of the contract vocabulary.
      x-lotus-status: documentation-only
      x-lotus-callable: false
      x-lotus-auth: internal
      x-lotus-side-effects: none
      x-lotus-danger: low
      responses:
        "200":
          description: Documentation-only schema bundle.
          content:
            application/json:
              schema:
                type: object
                properties:
                  paginatedResponse:
                    $ref: "#/components/schemas/PaginatedResponse"
                  rfq:
                    $ref: "#/components/schemas/RFQ"
                  laneApprovalRequest:
                    $ref: "#/components/schemas/LaneApprovalRequest"
                  laneApprovalResponse:
                    $ref: "#/components/schemas/LaneApprovalResponse"
                  approvedScope:
                    $ref: "#/components/schemas/ApprovedScope"
                  executionMetadata:
                    $ref: "#/components/schemas/ExecutionMetadata"
                  executionResult:
                    $ref: "#/components/schemas/ExecutionResult"
                  venueAdapterStatus:
                    $ref: "#/components/schemas/VenueAdapterStatus"
                  fundingRouteLeg:
                    $ref: "#/components/schemas/FundingRouteLeg"
                  venueCapability:
                    $ref: "#/components/schemas/VenueCapability"
                  fundingStatus:
                    $ref: "#/components/schemas/FundingStatus"
                  fundingIntentResponse:
                    $ref: "#/components/schemas/FundingIntentResponse"
                  feePreview:
                    $ref: "#/components/schemas/FeePreview"
                  auditEvent:
                    $ref: "#/components/schemas/AuditEvent"

  /combo-rfqs:
