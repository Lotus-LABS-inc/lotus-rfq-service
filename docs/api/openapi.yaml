  /user/venue-accounts:
    get:
      tags: [User]
      summary: Read user venue account bindings.
      description: Returns frontend-safe venue account metadata linked to the user's Turnkey EVM wallet. It never returns Turnkey provider internals, private keys, auth tokens, signatures, export bundles, or raw venue auth material.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: none
      x-lotus-danger: low
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/UserVenueAccounts" }
        "401": { $ref: "#/components/responses/Error" }
  /user/venue-accounts/{venue}:
    get:
      tags: [User]
      summary: Read one user venue account binding.
      description: Returns the frontend-safe account binding for one venue.
