      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: public
      x-lotus-side-effects: none
      x-lotus-danger: low
      parameters:
        - name: leftVenue
          in: query
          schema: { type: string }
        - name: leftMarketId
          in: query
          schema: { type: string }
        - name: rightVenue
          in: query
          schema: { type: string }
        - name: rightMarketId
          in: query
