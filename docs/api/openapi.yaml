      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin-owner
      x-lotus-side-effects: sends-admin-invite
      x-lotus-danger: high
      security: [{ bearerAuth: [] }]
      responses:
        "201": { $ref: "#/components/responses/AdminMemberInvite" }
        "403": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /admin/auth/members/{memberId}/keys:
    parameters:
      - name: memberId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
