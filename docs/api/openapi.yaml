components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: { type: string }
    LaneId:
      name: laneId
      in: path
      required: true
      schema: { type: string }
    Venue:
      name: venue
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Venue" }
    RecordId:
      name: recordId
      in: path
      required: true
      schema: { type: string }
    RouteClass:
      name: routeClass
      in: path
      required: true
      schema: { type: string }
  requestBodies:
    AdminAction:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionRequest"
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GenericObject:
      description: Artifact/service-shaped response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    LaneObject:
      description: Lane response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Lane"
    AdminAction:
      description: Admin action response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionResponse"
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        code: { type: string }
        error: { type: string }
        reason: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items: { type: object, additionalProperties: true }
        nextCursor:
          type: string
          nullable: true
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [lotus-rfq-service]
    RFQ:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        canonicalMarketId: { type: string }
        takerId: { type: string }
        side: { type: string, enum: [buy, sell] }
        quantity: { type: string }
        state: { type: string }
    CreateRFQRequest:
      type: object
      required: [canonicalMarketId, takerId, side, quantity, idempotencyKey, ttlSeconds]
      properties:
        canonicalMarketId: { type: string, minLength: 1 }
        takerId: { type: string, minLength: 1 }
        side: { type: string, enum: [buy, sell] }
        quantity:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
        idempotencyKey: { type: string, minLength: 1 }
        ttlSeconds:
          type: integer
          minimum: 1
          maximum: 300
    RFQResponse:
      type: object
      additionalProperties: true
      properties:
        sessionId: { type: string }
        status: { type: string }
    AcceptRFQRequest:
      type: object
      required: [quoteId]
      properties:
        quoteId: { type: string, minLength: 1 }
        executionScopeToken: { type: string, minLength: 1 }
    AcceptRFQResponse:
      type: object
      required: [status, plan_id, plan_state, dispatch_mode]
      properties:
        status:
          type: string
          enum: [PLAN_ACCEPTED]
        plan_id: { type: string }
        plan_state: { type: string }
        dispatch_mode:
          type: string
          enum: [awaited, background]
        final_status:
          type: string
          enum: [COMPLETED, PARTIAL, FAILED, UNWOUND]
        execution_id:
          type: string
          nullable: true
    ExecutionScopeTokenRequest:
      type: object
      required: [quoteId, scopeKind, scopeId]
      properties:
        quoteId: { type: string, minLength: 1 }
        scopeKind:
          type: string
          enum: [CRYPTO_LANE, SPORTS_LANE, POLITICS_NOMINEE_LANE]
        scopeId: { type: string, minLength: 1 }
        ttlSeconds:
          type: integer
          minimum: 1
          maximum: 300
    ExecutionScopeTokenResponse:
      type: object
      required: [token, expiresAt, singleUse, scope]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        singleUse: { type: boolean, enum: [true] }
        scope:
          type: object
          additionalProperties: true
    Lane:
      type: object
      additionalProperties: true
      properties:
        laneId: { type: string }
        laneState:
          $ref: "#/components/schemas/LaneState"
        topicKey: { type: string }
        venueSet:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
    LaneState:
      type: string
      enum:
        - MATCHER_READY
        - READINESS_READY_FOR_REVIEW
        - OPERATOR_REVIEW_REQUIRED
        - REVIEW_REQUIRED
        - TRI_REVIEW_REQUIRED
        - PAIR_REVIEW_REQUIRED
        - OPERATOR_APPROVED_SANDBOX
        - OPERATOR_APPROVED_LIMITED_PROD
        - HELD
        - ROLLED_BACK
        - REJECTED
    LaneApprovalRequest:
      allOf:
        - $ref: "#/components/schemas/AdminActionRequest"
    LaneApprovalResponse:
      allOf:
        - $ref: "#/components/schemas/AdminActionResponse"
    ApprovedScope:
      type: object
      additionalProperties: true
      properties:
        laneId: { type: string }
        topicKey: { type: string }
        venueSet:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        candidateSet:
          type: array
          items: { type: string }
        approvedScopeHash: { type: string }
    ExecutionRequest:
      type: object
      required:
        - executionId
        - rfqId
        - userId
        - canonicalTopicKey
        - side
        - size
        - selectedLaneId
        - venuePath
        - executionMode
        - approvedScopeHash
        - idempotencyKey
        - createdAt
      properties:
        executionId: { type: string }
        rfqId: { type: string }
        userId: { type: string }
        canonicalTopicKey: { type: string }
        canonicalOutcomeId: { type: string }
        candidateId: { type: string }
        side: { type: string, enum: [buy, sell] }
        size: { type: string }
        selectedLaneId: { type: string }
        venuePath:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        executionMode:
          type: string
          enum: [SINGLE_VENUE, PAIR, TRI, SPLIT]
        approvedScopeHash: { type: string }
        maxSlippage: { type: string }
        fastLaneEnabled: { type: boolean }
        ghostFillProtectionEnabled: { type: boolean }
        expectedPrice: { type: string }
        expectedFees:
          $ref: "#/components/schemas/FeeSummary"
        idempotencyKey: { type: string }
        createdAt: { type: string, format: date-time }
    ExecutionMetadata:
      type: object
      additionalProperties: true
      properties:
        request:
          $ref: "#/components/schemas/ExecutionRequest"
        legs:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionLeg"
        currentState:
          $ref: "#/components/schemas/ExecutionState"
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackStatus:
          $ref: "#/components/schemas/FallbackStatus"
        receipt:
          $ref: "#/components/schemas/ExecutionReceipt"
    ExecutionLeg:
      type: object
      additionalProperties: true
      properties:
        executionLegId: { type: string }
        parentExecutionId: { type: string }
        venue: { $ref: "#/components/schemas/Venue" }
        venueMarketId: { type: string }
        venueOutcomeId: { type: string }
        side: { type: string, enum: [buy, sell] }
        size: { type: string }
        price: { type: string }
        status: { type: string }
        submittedAt: { type: string, format: date-time }
        filledAt: { type: string, format: date-time }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        venueOrderId: { type: string }
        fillId: { type: string }
        errorCode: { type: string }
    ExecutionState:
      type: string
      enum:
        - CREATED
        - PREFLIGHT_CHECKING
        - PREFLIGHT_FAILED
        - READY_TO_SUBMIT
        - SUBMITTED
        - PARTIAL_FILL
        - FILLED_PENDING_SETTLEMENT
        - SETTLEMENT_VERIFIED
        - GHOST_FILL_SUSPECTED
        - GHOST_FILL_CONFIRMED
        - REROUTING
        - REROUTED
        - FAILED_CLOSED
        - COMPLETED
        - CANCELLED
    ExecutionResult:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        finalState:
          $ref: "#/components/schemas/ExecutionState"
        filledSize: { type: string }
        averagePrice: { type: string }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackUsed: { type: boolean }
        fees:
          $ref: "#/components/schemas/FeeSummary"
        receipt:
          $ref: "#/components/schemas/ExecutionReceipt"
    ExecutionStatusResponse:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        currentState:
          $ref: "#/components/schemas/ExecutionState"
        userStatus: { type: string }
        venuePath:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        filledAmount: { type: string }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackStatus:
          $ref: "#/components/schemas/FallbackStatus"
        feeSummary:
          $ref: "#/components/schemas/FeeSummary"
        receipt:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ExecutionReceipt"
    SettlementStatus:
      type: string
      enum:
        - SETTLEMENT_VERIFIED
        - SETTLEMENT_PENDING
        - SETTLEMENT_TIMEOUT
        - SETTLEMENT_UNKNOWN
        - GHOST_FILL_SUSPECTED
        - GHOST_FILL_CONFIRMED
        - NOT_APPLICABLE
        - DRY_RUN_ONLY
    GhostFillStatus:
      type: string
      enum: [NOT_APPLICABLE, NONE, SUSPECTED, CONFIRMED]
    FallbackStatus:
      type: string
      enum: [not_used, unavailable, rerouting, rerouted, failed_closed]
    ExecutionReceipt:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        finalState:
          $ref: "#/components/schemas/ExecutionState"
        filledSize: { type: string }
        averagePrice: { type: string }
        fees:
          $ref: "#/components/schemas/FeeSummary"
        emittedAt: { type: string, format: date-time }
    Venue:
      type: string
      enum: [POLYMARKET, LIMITLESS, OPINION, MYRIAD, PREDICT, PREDICT_FUN, TEST]
    VenueReadiness:
      type: string
      enum: [NOT_CONFIGURED, LIVE_DISABLED, STRUCTURALLY_READY, EXTERNALLY_BLOCKED, READY, DRY_RUN_READY, LIVE_READY]
    ExecutionVenueStatus:
      type: object
      additionalProperties: true
      properties:
        venue: { $ref: "#/components/schemas/Venue" }
        status: { $ref: "#/components/schemas/VenueReadiness" }
        liveExecutionEnabled: { type: boolean }
        envReady: { type: boolean }
        notes:
          type: array
          items: { type: string }
    VenueAdapterStatus:
      allOf:
        - $ref: "#/components/schemas/ExecutionVenueStatus"
    FundingIntent:
      type: object
      additionalProperties: true
      properties:
        fundingIntentId: { type: string }
        userId: { type: string }
        sourceChain: { type: string }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        targets:
          type: array
          items:
            $ref: "#/components/schemas/FundingTarget"
        status: { type: string }
    FundingTarget:
      type: object
      additionalProperties: true
      properties:
        targetVenue: { $ref: "#/components/schemas/Venue" }
        targetChain: { type: string }
        targetToken: { type: string }
        targetAmount: { type: string }
        targetPercentage: { type: number }
        status: { type: string }
    FundingRouteLeg:
      type: object
      additionalProperties: true
      properties:
        routeLegId: { type: string }
        fundingIntentId: { type: string }
        targetVenue: { $ref: "#/components/schemas/Venue" }
        routeProvider: { type: string, enum: [LIFI, MANUAL, TEST] }
        txHashes:
          type: array
          items: { type: string }
        bridgeStatus: { type: string }
        destinationStatus: { type: string }
        venueCreditStatus: { type: string }
        status: { type: string }
    VenueCapability:
      type: object
      additionalProperties: true
      properties:
        venue: { $ref: "#/components/schemas/Venue" }
        supportedChains:
          type: array
          items: { type: string }
        supportedTokens:
          type: array
          items: { type: string }
        preferredChain: { type: string }
        preferredToken: { type: string }
        readinessStatus: { type: string }
    FundingStatus:
      type: object
      additionalProperties: true
      properties:
        userId: { type: string }
        venueBalances:
          type: array
          items:
            type: object
            additionalProperties: true
        unifiedDisplayBalance:
          type: array
          items:
            type: object
            additionalProperties: true
    FundingRoutePreview:
      type: object
      additionalProperties: true
      properties:
        totalEstimatedFees: { type: string }
        totalEstimatedTime: { type: string }
        targets:
          type: array
          items:
            $ref: "#/components/schemas/FundingTarget"
    FundingIntentResponse:
      type: object
      additionalProperties: true
      properties:
        fundingIntentId: { type: string }
        currentStatus: { type: string }
        routePreview:
          $ref: "#/components/schemas/FundingRoutePreview"
    FeePreview:
      type: object
      additionalProperties: true
    FeeSummary:
      type: object
      additionalProperties: true
      properties:
        totalFees: { type: string }
        priceImprovementFee:
          $ref: "#/components/schemas/PriceImprovementFee"
        fastLaneFee:
          $ref: "#/components/schemas/FastLaneFee"
        ghostFillProtectionFee:
          $ref: "#/components/schemas/GhostFillProtectionFee"
    PriceImprovementFee:
      type: object
      properties:
        amount: { type: string }
        shareBps: { type: integer }
    FastLaneFee:
      type: object
      properties:
        enabled: { type: boolean }
        amount: { type: string }
    GhostFillProtectionFee:
      type: object
      properties:
        enabled: { type: boolean }
        amount: { type: string }
    AuditEvent:
      type: object
      additionalProperties: true
      properties:
        auditEventId: { type: string }
        type:
          $ref: "#/components/schemas/AuditEventType"
        createdAt: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
    AuditEventType:
      type: string
      enum:
        - EXECUTION_CREATED
        - PREFLIGHT_STARTED
        - PREFLIGHT_PASSED
        - PREFLIGHT_FAILED
        - ROUTE_SELECTED
        - LIQUIDITY_RESERVED
        - ORDER_SUBMITTED
        - PARTIAL_FILL_RECEIVED
        - FILL_RECEIVED
        - SETTLEMENT_CHECK_STARTED
        - SETTLEMENT_VERIFIED
        - GHOST_FILL_SUSPECTED
        - GHOST_FILL_CONFIRMED
        - REROUTE_STARTED
        - REROUTE_COMPLETED
        - FAILED_CLOSED
        - ACCOUNTING_UPDATED
        - USER_RECEIPT_EMITTED
    AdminActionRequest:
      type: object
      additionalProperties: true
      properties:
        operatorId: { type: string }
        reason: { type: string }
        note: { type: string }
    AdminActionResponse:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        eventId: { type: string }
