components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: { type: string }
    LaneId:
      name: laneId
      in: path
      required: true
      schema: { type: string }
    Venue:
      name: venue
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Venue" }
    RecordId:
      name: recordId
      in: path
      required: true
      schema: { type: string }
    RouteClass:
      name: routeClass
      in: path
      required: true
      schema: { type: string }
  requestBodies:
    AdminAction:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionRequest"
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GenericObject:
      description: Artifact/service-shaped response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    LaneObject:
      description: Lane response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Lane"
    AdminAction:
      description: Admin action response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionResponse"
    FundingIntent:
      description: Frontend-safe funding intent response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FundingIntentResponse"
    VenueBalances:
      description: Frontend-safe derived venue-ready balance rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VenueBalanceListResponse"
    UserWithdrawalWallets:
      description: User withdrawal destination wallet list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserWithdrawalWalletListResponse"
    UserWithdrawalWallet:
      description: User withdrawal destination wallet.
      content:
        application/json:
          schema:
            type: object
            required: [wallet]
            properties:
              wallet:
                $ref: "#/components/schemas/UserWithdrawalWallet"
    UserWallets:
      description: User wallet metadata list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserWalletListResponse"
    WithdrawalIntent:
      description: Frontend-safe withdrawal intent response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WithdrawalIntentResponse"
    AdminFundingReadinessList:
      description: Read-only admin funding readiness rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminFundingReadinessListResponse"
    AdminFundingReadinessSummary:
      description: Read-only operator summary for Funding Flow v0 readiness.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminFundingReadinessSummaryResponse"
    AdminLogin:
      description: Admin login token response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminLoginResponse"
    AdminRequestLoginLink:
      description: Generic self-service login-link request response. Does not reveal account existence or delivery status.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminRequestLoginLinkResponse"
    AdminMembers:
      description: Admin member list.
      content:
        application/json:
          schema:
            type: object
            required: [members]
            properties:
              members:
                type: array
                items: { $ref: "#/components/schemas/AdminMember" }
    AdminMember:
      description: Admin member response.
      content:
        application/json:
          schema:
            type: object
            required: [member]
            properties:
              member: { $ref: "#/components/schemas/AdminMember" }
    AdminMemberInvite:
      description: Admin member response with optional secret-free invite delivery metadata.
      content:
        application/json:
          schema:
            type: object
            required: [member]
            properties:
              member: { $ref: "#/components/schemas/AdminMember" }
              invite: { $ref: "#/components/schemas/AdminInvite" }
    AdminKeyCreated:
      description: Admin key creation response. loginKey is returned once.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminKeyCreatedResponse"
    AdminOpsSummary:
      description: Admin dashboard overview.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminOpsSummaryResponse"
    AdminMonetizationSummary:
      description: Monetization summary separating collected and shadow amounts.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminMonetizationSummaryResponse"
    AdminMonetizationLedger:
      description: Monetization ledger rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminMonetizationLedgerResponse"
    AdminSchemaMap:
      description: DB schema map for the admin visualizer.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminSchemaMapResponse"
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        code: { type: string }
        error: { type: string }
        reason: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
    AdminLoginRequest:
      type: object
      required: [email, loginKey]
      properties:
        email: { type: string, format: email }
        loginKey:
          type: string
          description: Owner-generated admin login key. Never log or expose after login.
    AdminMagicLoginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: One-time magic login token from the emailed admin link. Never log or expose after login.
    AdminRequestLoginLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    AdminRequestLoginLinkResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: If this email is authorized, a login link has been sent.
    AdminLoginResponse:
      type: object
      required: [token, tokenType, expiresInSeconds, member]
      properties:
        token: { type: string }
        tokenType: { type: string, enum: [Bearer] }
        expiresInSeconds: { type: integer }
        member: { $ref: "#/components/schemas/AdminMember" }
    AdminMemberCreateRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [OWNER, ADMIN], default: ADMIN }
        sendInvite:
          type: boolean
          default: true
          description: When true, backend sends a Resend magic-login invite and does not return plaintext credentials.
    AdminMember:
      type: object
      additionalProperties: true
      required: [id, email, role, status]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { type: string, enum: [OWNER, ADMIN] }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        keys:
          type: array
          items: { $ref: "#/components/schemas/AdminAuthKey" }
    AdminAuthKey:
      type: object
      additionalProperties: true
      description: Non-secret key metadata. keyHash is never returned.
      properties:
        id: { type: string, format: uuid }
        adminMemberId: { type: string, format: uuid }
        keyId: { type: string }
        keyType: { type: string, enum: [LOGIN_KEY, MAGIC_LINK] }
        status: { type: string, enum: [ACTIVE, REVOKED] }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    AdminKeyCreatedResponse:
      type: object
      required: [key, loginKey]
      properties:
        key: { $ref: "#/components/schemas/AdminAuthKey" }
        loginKey:
          type: string
          description: Plaintext login key returned once.
    AdminInvite:
      type: object
      description: Secret-free admin invite delivery metadata. The magic token is sent only by email.
      required: [sent, expiresAt, deliveryStatus, key]
      properties:
        sent: { type: boolean }
        expiresAt: { type: string, format: date-time }
        deliveryStatus: { type: string, enum: [SENT] }
        key: { $ref: "#/components/schemas/AdminAuthKey" }
    AdminOpsSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: object
          additionalProperties: true
    AdminMonetizationSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: object
          required: [generatedAt, totals, rows]
          properties:
            generatedAt: { type: string, format: date-time }
            totals:
              type: object
              required: [actualBuilderFeesCollected, shadowImprovementFees, uncollectedImprovementOpportunity]
              properties:
                actualBuilderFeesCollected: { type: string }
                shadowImprovementFees: { type: string }
                uncollectedImprovementOpportunity: { type: string }
            rows:
              type: array
              items:
                type: object
                additionalProperties: true
    AdminMonetizationLedgerResponse:
      type: object
      required: [ledger]
      properties:
        ledger:
          type: array
          items:
            type: object
            additionalProperties: true
    AdminSchemaMapResponse:
      type: object
      required: [schemaMap]
      properties:
        schemaMap:
          type: object
          required: [generatedAt, groups, tables, relationships]
          properties:
            generatedAt: { type: string, format: date-time }
            groups:
              type: array
              items:
                type: object
                required: [name, tableCount, relationshipCount]
                properties:
                  name: { type: string }
                  tableCount: { type: integer }
                  relationshipCount: { type: integer }
            tables:
              type: array
              items:
                type: object
                additionalProperties: true
            relationships:
              type: array
              items:
                type: object
                additionalProperties: true
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items: { type: object, additionalProperties: true }
        nextCursor:
          type: string
          nullable: true
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [lotus-rfq-service]
    RFQ:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        canonicalMarketId: { type: string }
        takerId: { type: string }
        side: { type: string, enum: [buy, sell] }
        quantity: { type: string }
        state: { type: string }
    CreateRFQRequest:
      type: object
      required: [canonicalMarketId, takerId, side, quantity, idempotencyKey, ttlSeconds]
      properties:
        canonicalMarketId: { type: string, minLength: 1 }
        takerId: { type: string, minLength: 1 }
        side: { type: string, enum: [buy, sell] }
        quantity:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
        idempotencyKey: { type: string, minLength: 1 }
        ttlSeconds:
          type: integer
          minimum: 1
          maximum: 300
    RFQResponse:
      type: object
      additionalProperties: true
      properties:
        sessionId: { type: string }
        status: { type: string }
    AcceptRFQRequest:
      type: object
      required: [quoteId]
      properties:
        quoteId: { type: string, minLength: 1 }
        executionScopeToken: { type: string, minLength: 1 }
    AcceptRFQResponse:
      type: object
      required: [status, plan_id, plan_state, dispatch_mode]
      properties:
        status:
          type: string
          enum: [PLAN_ACCEPTED]
        plan_id: { type: string }
        plan_state: { type: string }
        dispatch_mode:
          type: string
          enum: [awaited, background]
        final_status:
          type: string
          enum: [COMPLETED, PARTIAL, FAILED, UNWOUND]
        execution_id:
          type: string
          nullable: true
    ExecutionScopeTokenRequest:
      type: object
      required: [quoteId, scopeKind, scopeId]
      properties:
        quoteId: { type: string, minLength: 1 }
        scopeKind:
          type: string
          enum: [CRYPTO_LANE, SPORTS_LANE, POLITICS_NOMINEE_LANE]
        scopeId: { type: string, minLength: 1 }
        ttlSeconds:
          type: integer
          minimum: 1
          maximum: 300
    ExecutionScopeTokenResponse:
      type: object
      required: [token, expiresAt, singleUse, scope]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        singleUse: { type: boolean, enum: [true] }
        scope:
          type: object
          additionalProperties: true
    Lane:
      type: object
      additionalProperties: true
      properties:
        laneId: { type: string }
        laneState:
          $ref: "#/components/schemas/LaneState"
        topicKey: { type: string }
        venueSet:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
    LaneState:
      type: string
      enum:
        - MATCHER_READY
        - READINESS_READY_FOR_REVIEW
        - OPERATOR_REVIEW_REQUIRED
        - REVIEW_REQUIRED
        - TRI_REVIEW_REQUIRED
        - PAIR_REVIEW_REQUIRED
        - OPERATOR_APPROVED_SANDBOX
        - OPERATOR_APPROVED_LIMITED_PROD
        - HELD
        - ROLLED_BACK
        - REJECTED
    LaneApprovalRequest:
      allOf:
        - $ref: "#/components/schemas/AdminActionRequest"
    LaneApprovalResponse:
      allOf:
        - $ref: "#/components/schemas/AdminActionResponse"
    ApprovedScope:
      type: object
      additionalProperties: true
      properties:
        laneId: { type: string }
        topicKey: { type: string }
        venueSet:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        candidateSet:
          type: array
          items: { type: string }
        approvedScopeHash: { type: string }
    ExecutionRequest:
      type: object
      required:
        - executionId
        - rfqId
        - userId
        - canonicalTopicKey
        - side
        - size
        - selectedLaneId
        - venuePath
        - executionMode
        - approvedScopeHash
        - idempotencyKey
        - createdAt
      properties:
        executionId: { type: string }
        rfqId: { type: string }
        userId: { type: string }
        canonicalTopicKey: { type: string }
        canonicalOutcomeId: { type: string }
        candidateId: { type: string }
        side: { type: string, enum: [buy, sell] }
        size: { type: string }
        selectedLaneId: { type: string }
        venuePath:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        executionMode:
          type: string
          enum: [SINGLE_VENUE, PAIR, TRI, SPLIT]
        approvedScopeHash: { type: string }
        maxSlippage: { type: string }
        fastLaneEnabled: { type: boolean }
        ghostFillProtectionEnabled: { type: boolean }
        expectedPrice: { type: string }
        expectedFees:
          $ref: "#/components/schemas/FeeSummary"
        idempotencyKey: { type: string }
        createdAt: { type: string, format: date-time }
    ExecutionMetadata:
      type: object
      additionalProperties: true
      properties:
        request:
          $ref: "#/components/schemas/ExecutionRequest"
        legs:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionLeg"
        currentState:
          $ref: "#/components/schemas/ExecutionState"
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackStatus:
          $ref: "#/components/schemas/FallbackStatus"
        receipt:
          $ref: "#/components/schemas/ExecutionReceipt"
    ExecutionLeg:
      type: object
      additionalProperties: true
      properties:
        executionLegId: { type: string }
        parentExecutionId: { type: string }
        venue: { $ref: "#/components/schemas/Venue" }
        venueMarketId: { type: string }
        venueOutcomeId: { type: string }
        side: { type: string, enum: [buy, sell] }
        size: { type: string }
        price: { type: string }
        status: { type: string }
        submittedAt: { type: string, format: date-time }
        filledAt: { type: string, format: date-time }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        venueOrderId: { type: string }
        fillId: { type: string }
        errorCode: { type: string }
    ExecutionState:
      type: string
      enum:
        - CREATED
        - PREFLIGHT_CHECKING
        - PREFLIGHT_FAILED
        - READY_TO_SUBMIT
        - SUBMITTED
        - PARTIAL_FILL
        - FILLED_PENDING_SETTLEMENT
        - SETTLEMENT_VERIFIED
        - GHOST_FILL_SUSPECTED
        - GHOST_FILL_CONFIRMED
        - REROUTING
        - REROUTED
        - FAILED_CLOSED
        - COMPLETED
        - CANCELLED
    ExecutionResult:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        finalState:
          $ref: "#/components/schemas/ExecutionState"
        filledSize: { type: string }
        averagePrice: { type: string }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackUsed: { type: boolean }
        fees:
          $ref: "#/components/schemas/FeeSummary"
        receipt:
          $ref: "#/components/schemas/ExecutionReceipt"
    ExecutionStatusResponse:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        currentState:
          $ref: "#/components/schemas/ExecutionState"
        userStatus: { type: string }
        venuePath:
          type: array
          items: { $ref: "#/components/schemas/Venue" }
        filledAmount: { type: string }
        settlementStatus:
          $ref: "#/components/schemas/SettlementStatus"
        ghostFillStatus:
          $ref: "#/components/schemas/GhostFillStatus"
        fallbackStatus:
          $ref: "#/components/schemas/FallbackStatus"
        feeSummary:
          $ref: "#/components/schemas/FeeSummary"
        receipt:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ExecutionReceipt"
    SettlementStatus:
      type: string
      enum:
        - SETTLEMENT_VERIFIED
        - SETTLEMENT_PENDING
        - SETTLEMENT_TIMEOUT
        - SETTLEMENT_UNKNOWN
        - GHOST_FILL_SUSPECTED
        - GHOST_FILL_CONFIRMED
        - NOT_APPLICABLE
        - DRY_RUN_ONLY
    GhostFillStatus:
      type: string
      enum: [NOT_APPLICABLE, NONE, SUSPECTED, CONFIRMED]
    FallbackStatus:
      type: string
      enum: [not_used, unavailable, rerouting, rerouted, failed_closed]
    ExecutionReceipt:
      type: object
      additionalProperties: true
      properties:
        executionId: { type: string }
        finalState:
          $ref: "#/components/schemas/ExecutionState"
        filledSize: { type: string }
        averagePrice: { type: string }
        fees:
          $ref: "#/components/schemas/FeeSummary"
        emittedAt: { type: string, format: date-time }
    Venue:
      type: string
      enum: [POLYMARKET, LIMITLESS, OPINION, MYRIAD, PREDICT, PREDICT_FUN, TEST]
    VenueReadiness:
      type: string
      enum: [NOT_CONFIGURED, LIVE_DISABLED, STRUCTURALLY_READY, EXTERNALLY_BLOCKED, READY, DRY_RUN_READY, LIVE_READY]
    ExecutionVenueStatus:
      type: object
      additionalProperties: true
      properties:
        venue: { $ref: "#/components/schemas/Venue" }
        adapter:
          type: string
          enum: [PolymarketExecutionAdapterV2, LimitlessExecutionAdapter, NOT_IMPLEMENTED]
        executionSigningModel:
          type: string
          enum: [BACKEND_SIGNER, USER_SIGNED, USER_SIGNED_BACKEND_RELAY, DELEGATED_BACKEND_SIGNER, NOT_SUPPORTED]
        structuralReadiness:
          type: string
          enum: [NOT_CONFIGURED, LIVE_DISABLED, LIVE_READY]
        operationalStatus:
          type: string
          enum: [NOT_CONFIGURED, LIVE_DISABLED, STRUCTURALLY_READY, EXTERNALLY_BLOCKED]
        marketRoutingCoverage:
          type: string
          enum: [COVERED_BY_MATCHING, UNKNOWN]
        liveSubmissionSupported: { type: boolean }
        status: { $ref: "#/components/schemas/VenueReadiness" }
        liveExecutionEnabled: { type: boolean }
        featureFlagSelected: { type: boolean }
        envReady: { type: boolean }
        requiredEnvPresent: { type: boolean }
        missingEnv:
          type: array
          items: { type: string }
        dryRunRequiredEnvPresent: { type: boolean }
        missingDryRunEnv:
          type: array
          items: { type: string }
        credentialsServerSideOnly: { type: boolean }
        lastHarnessAttempt:
          type: object
          additionalProperties: true
        operatorMessage: { type: string }
        notes:
          type: array
          items: { type: string }
    VenueAdapterStatus:
      allOf:
        - $ref: "#/components/schemas/ExecutionVenueStatus"
    FundingIntent:
      type: object
      additionalProperties: true
      properties:
        fundingIntentId: { type: string }
        userId: { type: string }
        sourceChain: { type: string }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        targets:
          type: array
          items:
            $ref: "#/components/schemas/FundingTarget"
    CreateFundingIntentRequest:
      type: object
      required: [sourceChain, sourceToken, sourceAmount, idempotencyKey, targets]
      additionalProperties: false
      properties:
        sourceChain: { type: string, example: SOLANA }
        sourceToken: { type: string, example: USDC }
        sourceAmount: { type: string, example: "100" }
        sourceWalletAddress:
          type: string
          description: External source wallet address. Optional when sourceWalletId is supplied or a default Solana Turnkey funding wallet exists.
        sourceWalletId:
          type: string
          description: Stored user wallet id. If supplied, backend resolves the address server-side and rejects wallets not owned by the user.
        idempotencyKey: { type: string }
        targets:
          type: array
          minItems: 1
          items:
            type: object
            required: [targetVenue]
            additionalProperties: false
            properties:
              targetVenue: { $ref: "#/components/schemas/Venue" }
              targetAmount: { type: string }
              targetPercentage: { type: number, minimum: 0, maximum: 100 }
    SubmitFundingRouteLegRequest:
      type: object
      required: [routeLegId, txHash]
      additionalProperties: false
      properties:
        routeLegId: { type: string }
        txHash: { type: string }
        status: { type: string }
    FundingTarget:
      type: object
      additionalProperties: true
      properties:
        targetVenue: { $ref: "#/components/schemas/Venue" }
        targetChain: { type: string }
        targetToken: { type: string }
        targetAmount: { type: string }
        targetPercentage: { type: number }
        status: { type: string }
    FundingRouteLeg:
      type: object
      additionalProperties: true
      properties:
        routeLegId: { type: string }
        fundingIntentId: { type: string }
        targetVenue: { $ref: "#/components/schemas/Venue" }
        routeProvider: { type: string, enum: [LIFI, DIRECT_TRANSFER, MANUAL, TEST] }
        txHashes:
          type: array
          items: { type: string }
        bridgeStatus: { type: string }
        destinationStatus: { type: string }
        venueCreditStatus: { type: string }
        status: { type: string }
    VenueCapability:
      type: object
      additionalProperties: true
      properties:
        venue: { $ref: "#/components/schemas/Venue" }
        supportedChains:
          type: array
          items: { type: string }
        supportedTokens:
          type: array
          items: { type: string }
        preferredChain: { type: string }
        preferredToken: { type: string }
        supportsWithdrawal: { type: boolean }
        withdrawalMode:
          type: string
          enum: [USER_SIGNED, AUTO_RESOLUTION_ONLY, PARTNER_MANAGED_BACKEND, UNSUPPORTED]
          description: User-facing withdrawal model. AUTO_RESOLUTION_ONLY means normal user-signed withdrawal intents are not supported and payouts settle through venue-native market resolution.
        userSignedWithdrawalSupported: { type: boolean }
        partnerManagedWithdrawal:
          type: object
          nullable: true
          additionalProperties: false
          description: Disabled partner/backend withdrawal model metadata. This is not a user endpoint and requires explicit custody/security/operator approval before implementation.
          properties:
            mode: { type: string, enum: [PARTNER_MANAGED_BACKEND] }
            enabled: { type: boolean }
            requiresHmacAuth: { type: boolean }
            requiresWithdrawalScope: { type: boolean }
            requiresCustodySecurityApproval: { type: boolean }
            notes: { type: string }
        readinessStatus: { type: string }
    FundingStatus:
      type: object
      additionalProperties: true
      properties:
        userId: { type: string }
        venueBalances:
          type: array
          items:
            type: object
            additionalProperties: true
        unifiedDisplayBalance:
          description: Legacy display label for a derived capital view only. It does not imply Lotus custody, pooled funds, or sell-anywhere abstraction.
          type: array
          items:
            type: object
            additionalProperties: true
    FundingRoutePreview:
      type: object
      additionalProperties: true
      properties:
        totalEstimatedFees: { type: string }
        totalEstimatedTime: { type: string }
        targets:
          type: array
          items:
            $ref: "#/components/schemas/FundingTarget"
    FundingIntentResponse:
      type: object
      additionalProperties: true
      properties:
        fundingIntentId: { type: string }
        currentStatus: { type: string }
        sourceWalletId:
          type: string
          nullable: true
        sourceWalletAddress:
          type: string
          description: Public source wallet address only.
        routePreview:
          $ref: "#/components/schemas/FundingRoutePreview"
    VenueBalance:
      type: object
      additionalProperties: false
      required: [userId, venue, token, readyAmount, pendingWithdrawalAmount, availableAmount, lastReadyAt]
      properties:
        userId: { type: string }
        venue: { $ref: "#/components/schemas/Venue" }
        token: { type: string }
        readyAmount:
          type: string
          description: Persisted READY_TO_TRADE venue-ready amount for this user/venue/token.
        pendingWithdrawalAmount:
          type: string
          description: Active withdrawal amount already created/submitted from this venue/token.
        availableAmount:
          type: string
          description: Derived display amount equal to readyAmount minus active withdrawal amount. This is not a custodial pooled balance.
        lastReadyAt:
          type: string
          format: date-time
          nullable: true
    VenueBalanceListResponse:
      type: object
      additionalProperties: false
      required: [balances]
      properties:
        balances:
          type: array
          items: { $ref: "#/components/schemas/VenueBalance" }
    UserWithdrawalWallet:
      type: object
      additionalProperties: false
      required: [userId, chainFamily, address, label, verifiedAt, createdAt, updatedAt]
      properties:
        userId: { type: string }
        chainFamily:
          type: string
          enum: [EVM]
        address:
          type: string
          description: Public destination wallet address only. Never a private key or signer secret.
        label:
          type: string
          nullable: true
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserWithdrawalWalletListResponse:
      type: object
      additionalProperties: false
      required: [wallets]
      properties:
        wallets:
          type: array
          items: { $ref: "#/components/schemas/UserWithdrawalWallet" }
    UserWallet:
      type: object
      additionalProperties: false
      required: [walletId, provider, chainFamily, chain, address, purpose, venue, exportable, status, createdAt, updatedAt]
      properties:
        walletId: { type: string }
        provider:
          type: string
          enum: [TURNKEY, EXTERNAL]
        chainFamily:
          type: string
          enum: [SOLANA, EVM]
        chain: { type: string }
        address:
          type: string
          description: Public wallet address only.
        purpose:
          type: string
          enum: [DEFAULT_FUNDING, VENUE_TARGET, WITHDRAWAL_DESTINATION]
        venue:
          nullable: true
          $ref: "#/components/schemas/Venue"
        exportable: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserWalletListResponse:
      type: object
      additionalProperties: false
      required: [wallets]
      properties:
        wallets:
          type: array
          items: { $ref: "#/components/schemas/UserWallet" }
    UpsertEvmWithdrawalWalletRequest:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
          description: EVM-compatible wallet address for receiving withdrawals such as Predict.fun BSC USDT.
        label:
          type: string
          maxLength: 80
    WithdrawalStatus:
      type: string
      enum:
        - WITHDRAWAL_CREATED
        - WITHDRAWAL_QUOTED
        - USER_SIGNATURE_REQUIRED
        - USER_SIGNED
        - WITHDRAWAL_SUBMITTED
        - PARTIALLY_WITHDRAWING
        - WITHDRAWING
        - PARTIALLY_COMPLETED
        - COMPLETED
        - PARTIALLY_FAILED
        - FAILED
        - CANCELLED
        - RETRY_REQUIRED
    WithdrawalLegStatus:
      type: string
      enum:
        - WITHDRAWAL_LEG_CREATED
        - WITHDRAWAL_LEG_QUOTED
        - WITHDRAWAL_LEG_SIGNATURE_REQUIRED
        - WITHDRAWAL_LEG_SUBMITTED
        - VENUE_RELEASE_PENDING
        - DESTINATION_PENDING
        - DESTINATION_RECEIVED
        - WITHDRAWAL_LEG_COMPLETED
        - WITHDRAWAL_LEG_FAILED
        - WITHDRAWAL_LEG_RETRY_REQUIRED
    CreateWithdrawalIntentRequest:
      type: object
      required: [token, amount, destinationChain, destinationWalletAddress, idempotencyKey, sources]
      additionalProperties: false
      properties:
        token: { type: string, example: USDC }
        amount: { type: string, example: "100" }
        destinationChain: { type: string, example: POLYGON }
        destinationWalletAddress:
          type: string
          description: User-controlled destination wallet. Lotus validates format but does not custody or broadcast.
        idempotencyKey: { type: string }
        sources:
          type: array
          minItems: 1
          items:
            type: object
            required: [sourceVenue]
            additionalProperties: false
            properties:
              sourceVenue: { $ref: "#/components/schemas/Venue" }
              sourceAmount: { type: string }
              sourcePercentage: { type: number, minimum: 0, maximum: 100 }
    SubmitWithdrawalRouteLegRequest:
      type: object
      required: [withdrawalRouteLegId, txHash]
      additionalProperties: false
      properties:
        withdrawalRouteLegId: { type: string }
        txHash:
          type: string
          description: User-broadcast transaction hash. Backend records only; it does not broadcast.
    WithdrawalSource:
      type: object
      additionalProperties: true
      properties:
        withdrawalSourceId: { type: string }
        withdrawalIntentId: { type: string }
        sourceVenue: { $ref: "#/components/schemas/Venue" }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        sourcePercentage: { type: number, nullable: true }
        status: { $ref: "#/components/schemas/WithdrawalLegStatus" }
    WithdrawalRouteLeg:
      type: object
      additionalProperties: true
      properties:
        withdrawalRouteLegId: { type: string }
        withdrawalIntentId: { type: string }
        withdrawalSourceId: { type: string }
        sourceVenue: { $ref: "#/components/schemas/Venue" }
        sourceToken: { type: string }
        sourceAmount: { type: string }
        destinationChain: { type: string }
        destinationWalletAddress: { type: string }
        destinationAmountEstimate: { type: string }
        routeProvider: { type: string, enum: [LOTUS_WITHDRAWAL_V0] }
        routeQuote:
          type: object
          additionalProperties: true
          description: Frontend-safe withdrawal preview. It must not contain provider secrets or live venue withdrawal internals.
        providerStatus:
          type: object
          additionalProperties: true
          description: Sanitized provider status metadata. Limitless bridge-back rows may include provider=LIFI, mode=LIMITLESS_BRIDGE_BACK, source/destination chain and token, partnerManagedWithdrawalCalled=false, and completionPersisted=false. Venue EVM bridge-back rows may include provider=LIFI, mode=VENUE_EVM_BRIDGE_BACK, sourceWalletProvider=TURNKEY or EXTERNAL_EVM, sourceWalletAddress, requiresPriorVenueRelease=true, backendBroadcast=false, and completionPersisted=false. Polymarket Bridge sandbox rows may include provider=POLYMARKET_BRIDGE, mode=SANDBOX_DRY_RUN, bridgeAddressPresent, status, completionPersisted=false, and warnings. Predict.fun user-wallet dry-run rows may include provider=PREDICT_FUN_USER_WALLET, mode=USER_WALLET_DRY_RUN, walletModel=PRIVY_ZERODEV, destinationWalletProfileRequired=true, evmWithdrawalWalletPresent, instructionsUrl, completionPersisted=false, and warnings such as "Add an EVM-compatible wallet to receive BSC USDT withdrawals." Raw provider payloads, API keys, auth headers, private keys, wallet seeds, Privy secrets, ZeroDev signer material, DB URLs, and live withdrawal internals must not be returned.
        txHashes:
          type: array
          items: { type: string }
        venueReleaseStatus: { type: string }
        destinationStatus: { type: string }
        status: { $ref: "#/components/schemas/WithdrawalLegStatus" }
    PolymarketBridgeWithdrawalPreview:
      type: object
      additionalProperties: false
      description: Optional frontend-safe Polymarket Bridge sandbox preview. It is available only when disabled-by-default Bridge sandbox wiring is explicitly enabled and does not represent live execution or completion evidence.
      properties:
        provider: { type: string, enum: [POLYMARKET_BRIDGE] }
        mode: { type: string, enum: [SANDBOX_DRY_RUN] }
        bridgeAddressPresent: { type: boolean }
        bridgeAddress:
          type: string
          description: User-action address returned by the Bridge prepare flow. It is not a Lotus custody address and is returned only as frontend-safe instruction metadata.
        destinationChain: { type: string }
        destinationToken: { type: string }
        destinationAddress: { type: string }
        amount: { type: string }
        estimatedFees: { type: string }
        estimatedTimeSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
        warnings:
          type: array
          items: { type: string }
        completionPersisted:
          type: boolean
          enum: [false]
    PredictFunUserWalletWithdrawalPreview:
      type: object
      additionalProperties: false
      description: Optional frontend-safe Predict.fun user-wallet dry-run preview. It is available only when disabled-by-default Predict.fun adapter wiring is explicitly enabled and does not represent backend signing, backend broadcast, live venue mutation, or completion evidence.
      properties:
        provider: { type: string, enum: [PREDICT_FUN_USER_WALLET] }
        mode: { type: string, enum: [USER_WALLET_DRY_RUN] }
        walletModel: { type: string, enum: [PRIVY_ZERODEV] }
        instructionsUrl: { type: string }
        destinationWalletProfileRequired: { type: boolean }
        evmWithdrawalWalletPresent: { type: boolean }
        destinationChain: { type: string }
        destinationToken: { type: string }
        destinationAddress: { type: string }
        amount: { type: string }
        estimatedFees: { type: string }
        estimatedTimeSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
        warnings:
          type: array
          items: { type: string }
        completionPersisted:
          type: boolean
          enum: [false]
    LimitlessBridgeBackWithdrawalPreview:
