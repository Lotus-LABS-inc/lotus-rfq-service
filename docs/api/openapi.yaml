components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: { type: string }
    LaneId:
      name: laneId
      in: path
      required: true
      schema: { type: string }
    Venue:
      name: venue
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Venue" }
    RecordId:
      name: recordId
      in: path
      required: true
      schema: { type: string }
    RouteClass:
      name: routeClass
      in: path
      required: true
      schema: { type: string }
  requestBodies:
    AdminAction:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionRequest"
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GenericObject:
      description: Artifact/service-shaped response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    MarketCategories:
      description: Approved user-facing market categories.
      content:
        application/json:
          schema:
            type: object
            required: [categories]
            properties:
              categories:
                type: array
                items:
                  $ref: "#/components/schemas/MarketCatalogCategory"
    MarketList:
      description: Approved user-facing canonical markets.
      content:
        application/json:
          schema:
            type: object
            required: [markets, count]
            properties:
              markets:
                type: array
                items:
                  $ref: "#/components/schemas/MarketCatalogMarket"
              count: { type: integer }
    MarketEventList:
      description: Approved event-first market catalog.
      content:
        application/json:
          schema:
            type: object
            required: [events, count]
            properties:
              events:
                type: array
                items:
                  $ref: "#/components/schemas/MarketCatalogEvent"
              count: { type: integer }
    MarketEventDetail:
      description: Approved event group.
      content:
        application/json:
          schema:
            type: object
            required: [event]
            properties:
              event:
                $ref: "#/components/schemas/MarketCatalogEvent"
    EventMarkets:
      description: Approved child markets under an event group.
      content:
        application/json:
          schema:
            type: object
            required: [eventId, title, markets, count]
            properties:
              eventId: { type: string }
              title: { type: string }
              markets:
                type: array
                items:
                  $ref: "#/components/schemas/MarketCatalogMarket"
              count: { type: integer }
    MarketDetail:
      description: Approved canonical market.
      content:
        application/json:
          schema:
            type: object
            required: [market]
            properties:
              market:
                $ref: "#/components/schemas/MarketCatalogMarket"
    MarketOutcomes:
      description: Normalized canonical market outcomes.
      content:
        application/json:
          schema:
            type: object
            required: [canonicalEventId, title, outcomes]
            properties:
              canonicalEventId: { type: string }
              title: { type: string }
              outcomes:
                type: array
                items:
                  type: object
                  required: [id, label, venues]
                  properties:
                    id: { type: string }
                    label: { type: string }
                    venues:
                      type: array
                      items: { type: string }
    MarketOrderbook:
      description: Sanitized live orderbook response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MarketOrderbookResponse"
    MarketChart:
      description: Lotus live market chart response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MarketChartResponse"
    LaneObject:
      description: Lane response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Lane"
    AdminAction:
      description: Admin action response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminActionResponse"
    FundingIntent:
      description: Frontend-safe funding intent response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FundingIntentResponse"
    VenueBalances:
      description: Frontend-safe derived venue-ready balance rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VenueBalanceListResponse"
    VenueActivations:
      description: Frontend-safe venue balance activation requirements.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VenueActivationListResponse"
    FundingHistory:
      description: Frontend-safe funding and withdrawal history rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FundingHistoryListResponse"
    UserWithdrawalWallets:
      description: User withdrawal destination wallet list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserWithdrawalWalletListResponse"
    UserWithdrawalWallet:
      description: User withdrawal destination wallet.
      content:
        application/json:
          schema:
            type: object
            required: [wallet]
            properties:
              wallet:
                $ref: "#/components/schemas/UserWithdrawalWallet"
    UserWallets:
      description: User wallet metadata list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserWalletListResponse"
    UserVenueAccount:
      description: User venue account binding.
      content:
        application/json:
          schema:
            type: object
            required: [venueAccount]
            properties:
              venueAccount:
                $ref: "#/components/schemas/UserVenueAccount"
    UserVenueAccounts:
      description: User venue account binding list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserVenueAccountListResponse"
    UserVenueAccountSetupBatch:
      description: Batch user venue account setup state and signable setup requests.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserVenueAccountSetupBatchResponse"
    PredictFunAccountAuthMessage:
      description: Predict.fun account auth message for frontend Turnkey signing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PredictFunAccountAuthMessageResponse"
    WithdrawalIntent:
      description: Frontend-safe withdrawal intent response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WithdrawalIntentResponse"
    AdminFundingReadinessList:
      description: Read-only admin funding readiness rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminFundingReadinessListResponse"
    AdminFundingReadinessSummary:
      description: Read-only operator summary for Funding Flow v0 readiness.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminFundingReadinessSummaryResponse"
    AdminLogin:
      description: Admin login token response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminLoginResponse"
    AdminRequestLoginLink:
      description: Generic self-service login-link request response. Does not reveal account existence or delivery status.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminRequestLoginLinkResponse"
    AdminMembers:
      description: Admin member list.
      content:
        application/json:
          schema:
            type: object
            required: [members]
            properties:
              members:
                type: array
                items: { $ref: "#/components/schemas/AdminMember" }
    AdminMember:
      description: Admin member response.
      content:
        application/json:
          schema:
            type: object
            required: [member]
            properties:
              member: { $ref: "#/components/schemas/AdminMember" }
    AdminMemberInvite:
      description: Admin member response with optional secret-free invite delivery metadata.
      content:
        application/json:
          schema:
            type: object
            required: [member]
            properties:
              member: { $ref: "#/components/schemas/AdminMember" }
              invite: { $ref: "#/components/schemas/AdminInvite" }
    AdminKeyCreated:
      description: Admin key creation response. loginKey is returned once.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminKeyCreatedResponse"
    AdminOpsSummary:
      description: Admin dashboard overview.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminOpsSummaryResponse"
    AdminMonetizationSummary:
      description: Monetization summary separating collected and shadow amounts.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminMonetizationSummaryResponse"
    AdminMonetizationLedger:
      description: Monetization ledger rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminMonetizationLedgerResponse"
    AdminSchemaMap:
      description: DB schema map for the admin visualizer.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminSchemaMapResponse"
  schemas:
    ExecutionOrderPreviewRequest:
      type: object
      required: [marketId, outcomeId, side, amount, venuePreference]
      additionalProperties: false
      properties:
        marketId: { type: string }
        outcomeId: { type: string }
        side: { type: string, enum: [buy, sell] }
        amount:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
        venuePreference:
          type: string
          enum: [BEST_ROUTE, POLYMARKET, LIMITLESS, PREDICT_FUN, OPINION]
    ExecutionOrderSignaturesRequest:
      type: object
      required: [signedPayloads]
      additionalProperties: false
      properties:
        signedPayloads:
          type: array
          items:
            type: object
            required: [legIndex, venue, signedPayload]
            properties:
              legIndex: { type: integer, minimum: 0 }
              venue: { type: string }
              requestType: { type: string }
              signedPayload:
                type: object
                additionalProperties: true
    ExecutionOrderResponse:
      type: object
      required:
        - orderId
        - state
        - primaryAction
        - signingMode
        - venuePreference
        - readinessSummary
        - venueCapabilitySummary
        - blockers
      properties:
        orderId: { type: string }
        quoteId: { type: string, nullable: true }
        executionId: { type: string, nullable: true }
        state:
          type: string
          enum:
            - READY_TO_PLACE
            - NEEDS_SIGNATURE
            - NEEDS_VENUE_SETUP
            - WAITING_FOR_VENUE_READY
            - BLOCKED_ACTION_REQUIRED
            - SUBMITTING
            - SUBMITTED
            - FILLED
            - FAILED
            - EXPIRED
        primaryAction:
          type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [PLACE_ORDER, SIGN, ENABLE_VENUE, NONE]
        signingMode:
          type: string
          enum: [NONE, USER_SIGNATURE_REQUIRED, BACKEND_SIGNABLE, MIXED, UNSUPPORTED]
        routeSummary: { type: object, nullable: true, additionalProperties: true }
        priceSummary: { type: object, nullable: true, additionalProperties: true }
        venuePreference:
          type: string
          enum: [BEST_ROUTE, POLYMARKET, LIMITLESS, PREDICT_FUN, OPINION]
        readinessSummary: { type: object, additionalProperties: true }
        venueCapabilitySummary: { type: object, additionalProperties: true }
        blockers:
          type: array
          items:
            type: object
            required: [code, message, actionable]
            properties:
              code: { type: string }
              message: { type: string }
              venue: { type: string }
              actionable: { type: boolean }
        signatureRequests:
          type: array
          items:
            type: object
            additionalProperties: true
        nextPollAt: { type: string, format: date-time, nullable: true }
        canAutoRenew: { type: boolean }
        renewalReason: { type: string, enum: [QUOTE_EXPIRED] }
    MarketCatalogCategory:
      type: object
      required: [category, marketCount]
      properties:
        category: { type: string }
        marketCount: { type: integer }
        eventCount: { type: integer }
    MarketCatalogMediaFields:
      type: object
      properties:
        imageUrl:
          type: string
          nullable: true
          description: Sanitized HTTPS image URL from approved venue metadata, or null.
        iconUrl:
          type: string
          nullable: true
          description: Sanitized HTTPS icon URL from approved venue metadata, or null.
    MarketCatalogMetricFields:
      type: object
      properties:
        volume:
          type: string
          nullable: true
          description: Aggregated venue market volume from approved venue metadata, when available.
        volume24h:
          type: string
          nullable: true
          description: Aggregated 24 hour venue market volume from approved venue metadata, when available.
        liquidity:
          type: string
          nullable: true
          description: Aggregated venue market liquidity/open-interest metric from approved venue metadata, when available.
        buyVolume:
          type: string
          nullable: true
          description: Aggregated buy-side volume from approved venue metadata, when available.
        sellVolume:
          type: string
          nullable: true
          description: Aggregated sell-side volume from approved venue metadata, when available.
        tradeCount:
          type: string
          nullable: true
          description: Aggregated trade or transaction count from approved venue metadata, when available.
        buyCount:
          type: string
          nullable: true
          description: Aggregated buy-side trade or transaction count from approved venue metadata, when available.
        sellCount:
          type: string
          nullable: true
          description: Aggregated sell-side trade or transaction count from approved venue metadata, when available.
    MarketCatalogVenueMarket:
      allOf:
        - $ref: "#/components/schemas/MarketCatalogMediaFields"
        - $ref: "#/components/schemas/MarketCatalogMetricFields"
        - type: object
          required: [canonicalMarketId, canonicalMarketTitle, venue, venueMarketProfileId, venueMarketId, venueTitle, marketClass, outcomes, expiresAt, resolvesAt]
          properties:
            canonicalMarketId: { type: string }
            canonicalMarketTitle: { type: string }
            venue: { type: string }
            venueMarketProfileId: { type: string }
            venueMarketId: { type: string }
            venueTitle: { type: string }
            marketClass: { type: string }
            outcomes:
              type: array
              items:
                type: object
                required: [id, label]
                properties:
                  id: { type: string }
                  label: { type: string }
            network: { type: string, nullable: true }
            chain: { type: string, nullable: true }
            change24h:
              type: string
              nullable: true
              description: Venue-provided absolute 24 hour price movement, when available.
            changePercent24h:
              type: string
              nullable: true
              description: Venue-provided 24 hour percentage price movement, when available.
            expiresAt: { type: string, nullable: true }
            resolvesAt: { type: string, nullable: true }
    MarketCatalogMarket:
      allOf:
        - $ref: "#/components/schemas/MarketCatalogMediaFields"
        - $ref: "#/components/schemas/MarketCatalogMetricFields"
        - type: object
          required: [canonicalEventId, canonicalMarketIds, title, normalizedTitle, category, marketClass, status, venues, venueCount, venueMarketCount, outcomeCount, routeability, venueMarkets, updatedAt]
          properties:
            eventId: { type: string }
            eventTitle: { type: string }
            canonicalEventId: { type: string }
            canonicalMarketIds:
              type: array
              items: { type: string }
            title: { type: string }
            normalizedTitle: { type: string }
            category: { type: string }
            marketClass: { type: string }
            status: { type: string, enum: [OPEN, RESOLVING, RESOLVED_OR_EXPIRED] }
            startsAt: { type: string, nullable: true }
            expiresAt: { type: string, nullable: true }
            resolvesAt: { type: string, nullable: true }
            venues:
              type: array
              items: { type: string }
            venueCount: { type: integer }
            venueMarketCount: { type: integer }
            outcomeCount: { type: integer }
            routeability:
              type: object
              required: [hasSingleVenue, hasCrossVenue]
              properties:
                hasSingleVenue: { type: boolean }
                hasCrossVenue: { type: boolean }
            venueMarkets:
              type: array
              items:
                $ref: "#/components/schemas/MarketCatalogVenueMarket"
            updatedAt: { type: string }
    MarketCatalogEvent:
      allOf:
        - $ref: "#/components/schemas/MarketCatalogMediaFields"
        - $ref: "#/components/schemas/MarketCatalogMetricFields"
        - type: object
          required: [eventId, title, normalizedTitle, category, status, marketCount, featuredMarkets, markets, venues, venueCount, venueMarketCount, outcomeCount, routeability, updatedAt]
          properties:
            eventId: { type: string }
            title: { type: string }
            normalizedTitle: { type: string }
            category: { type: string }
            status: { type: string, enum: [OPEN, RESOLVING, RESOLVED_OR_EXPIRED] }
            marketCount: { type: integer }
            featuredMarkets:
              type: array
              items:
                $ref: "#/components/schemas/MarketCatalogMarket"
            markets:
              type: array
              items:
                $ref: "#/components/schemas/MarketCatalogMarket"
            venues:
              type: array
              items: { type: string }
            venueCount: { type: integer }
            venueMarketCount: { type: integer }
            outcomeCount: { type: integer }
            routeability:
              type: object
              required: [hasSingleVenue, hasCrossVenue]
              properties:
                hasSingleVenue: { type: boolean }
                hasCrossVenue: { type: boolean }
            updatedAt: { type: string }
    MarketOrderbookLevel:
      type: object
      required: [venue, venueMarketId, venueOutcomeId, price, size, cumulativeSize, cumulativeNotional]
      properties:
        venue: { type: string }
        venueMarketId: { type: string }
        venueOutcomeId: { type: string, nullable: true }
        price:
          type: string
          description: Probability price as a decimal string, usually 0 to 1.
        size: { type: string }
        cumulativeSize: { type: string }
        cumulativeNotional: { type: string }
    MarketOrderbookVenue:
      type: object
      required: [venue, venueMarketId, venueOutcomeId, source, quoteQuality, sourceTimestamp, receivedAt, bestBid, bestAsk, midpoint, spread, bidDepth, askDepth, blockers, bids, asks]
      properties:
        venue: { type: string }
        venueMarketId: { type: string }
        venueOutcomeId: { type: string, nullable: true }
        source: { type: string, enum: [STREAM, REST] }
        quoteQuality: { type: string }
        sourceTimestamp: { type: string, nullable: true }
        receivedAt: { type: string }
        bestBid: { type: string, nullable: true }
        bestAsk: { type: string, nullable: true }
        midpoint: { type: string, nullable: true }
        spread: { type: string, nullable: true }
        bidDepth: { type: string }
        askDepth: { type: string }
        blockers:
          type: array
          items: { type: string }
        bids:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookLevel"
        asks:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookLevel"
    MarketOrderbookBlocker:
      type: object
      required: [venue, reason]
      properties:
        venue: { type: string }
        reason: { type: string }
        venueMarketId: { type: string }
        venueOutcomeId: { type: string }
    MarketOrderbookResponse:
      type: object
      required: [marketId, outcomeId, generatedAt, depth, venues, bids, asks, bestBid, bestAsk, midpoint, spread, status, blockers]
      properties:
        marketId: { type: string }
        outcomeId: { type: string, nullable: true }
        generatedAt: { type: string }
        depth: { type: integer }
        venues:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookVenue"
        bids:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookLevel"
        asks:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookLevel"
        bestBid: { type: string, nullable: true }
        bestAsk: { type: string, nullable: true }
        midpoint: { type: string, nullable: true }
        spread: { type: string, nullable: true }
        status: { type: string, enum: [live, partial, unavailable] }
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookBlocker"
    MarketChartResponse:
      type: object
      required: [marketId, outcomeId, timeframe, generatedAt, historyStatus, series, points, blockers]
      properties:
        marketId: { type: string }
        outcomeId: { type: string, nullable: true }
        timeframe: { type: string, enum: [1H, 6H, 1D, 1W, 1M, ALL] }
        generatedAt: { type: string }
        historyStatus: { type: string, enum: [live, accumulating, unavailable] }
        series:
          type: array
          items:
            type: object
            required: [id, label, color]
            properties:
              id: { type: string }
              label: { type: string }
              color: { type: string }
        points:
          type: array
          items:
            type: object
            required: [timestamp, label, unified, venues]
            properties:
              timestamp: { type: string }
              label: { type: string }
              unified: { type: string, nullable: true }
              venues:
                type: object
                additionalProperties:
                  type: string
                  nullable: true
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/MarketOrderbookBlocker"
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        code: { type: string }
        error: { type: string }
        reason: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
    AdminLoginRequest:
      type: object
      required: [email, loginKey]
      properties:
        email: { type: string, format: email }
        loginKey:
          type: string
          description: Owner-generated admin login key. Never log or expose after login.
    AdminMagicLoginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: One-time magic login token from the emailed admin link. Never log or expose after login.
    AdminRequestLoginLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    AdminRequestLoginLinkResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: If this email is authorized, a login link has been sent.
    AdminLoginResponse:
      type: object
      required: [token, tokenType, expiresInSeconds, member]
      properties:
        token: { type: string }
        tokenType: { type: string, enum: [Bearer] }
        expiresInSeconds: { type: integer }
        member: { $ref: "#/components/schemas/AdminMember" }
    AdminMemberCreateRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [OWNER, ADMIN], default: ADMIN }
        sendInvite:
          type: boolean
          default: true
          description: When true, backend sends a Resend magic-login invite and does not return plaintext credentials.
    AdminMember:
      type: object
      additionalProperties: true
      required: [id, email, role, status]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { type: string, enum: [OWNER, ADMIN] }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        keys:
          type: array
          items: { $ref: "#/components/schemas/AdminAuthKey" }
    AdminAuthKey:
      type: object
      additionalProperties: true
      description: Non-secret key metadata. keyHash is never returned.
      properties:
        id: { type: string, format: uuid }
        adminMemberId: { type: string, format: uuid }
        keyId: { type: string }
        keyType: { type: string, enum: [LOGIN_KEY, MAGIC_LINK] }
        status: { type: string, enum: [ACTIVE, REVOKED] }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    AdminKeyCreatedResponse:
      type: object
      required: [key, loginKey]
      properties:
        key: { $ref: "#/components/schemas/AdminAuthKey" }
        loginKey:
          type: string
          description: Plaintext login key returned once.
    AdminInvite:
      type: object
      description: Secret-free admin invite delivery metadata. The magic token is sent only by email.
      required: [sent, expiresAt, deliveryStatus, key]
      properties:
        sent: { type: boolean }
        expiresAt: { type: string, format: date-time }
        deliveryStatus: { type: string, enum: [SENT] }
        key: { $ref: "#/components/schemas/AdminAuthKey" }
    AdminOpsSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: object
          additionalProperties: true
    AdminMonetizationSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: object
          required: [generatedAt, totals, rows]
          properties:
            generatedAt: { type: string, format: date-time }
            totals:
              type: object
              required: [actualBuilderFeesCollected, shadowImprovementFees, uncollectedImprovementOpportunity]
              properties:
                actualBuilderFeesCollected: { type: string }
                shadowImprovementFees: { type: string }
                uncollectedImprovementOpportunity: { type: string }
            rows:
              type: array
              items:
                type: object
                additionalProperties: true
    AdminMonetizationLedgerResponse:
      type: object
      required: [ledger]
      properties:
        ledger:
          type: array
          items:
            type: object
            additionalProperties: true
    AdminSchemaMapResponse:
      type: object
      required: [schemaMap]
      properties:
        schemaMap:
          type: object
          required: [generatedAt, groups, tables, relationships]
          properties:
            generatedAt: { type: string, format: date-time }
            groups:
              type: array
              items:
                type: object
                required: [name, tableCount, relationshipCount]
                properties:
                  name: { type: string }
                  tableCount: { type: integer }
                  relationshipCount: { type: integer }
            tables:
              type: array
              items:
                type: object
                additionalProperties: true
            relationships:
              type: array
              items:
                type: object
