  /user/venue-accounts/{venue}/ensure:
    post:
      tags: [User]
      summary: Ensure a user venue account binding.
      description: Requires an active user-controlled Turnkey EVM wallet and creates or updates safe metadata for the venue account. Lotus does not sign, broadcast, export keys, or store user signatures.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-venue-account
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: venue
          required: true
          schema: { $ref: "#/components/schemas/Venue" }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnsureUserVenueAccountRequest"
      responses:
        "200": { $ref: "#/components/responses/UserVenueAccount" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /user/venue-accounts/setup-batch:
    post:
      tags: [User]
      summary: Prepare batch venue-account setup.
      description: Ensures frontend-safe account bindings for user-signed venues and returns any setup payloads that the frontend can sign with the active Turnkey EVM wallet. Predict.fun can return a signable auth message. Limitless can return a partner-account ownership message when partner-account automation is configured. Opinion can create/recover a Builder Mode Safe and return an enable-trading Safe transaction when builder setup is enabled, with manual Safe linking as fallback. Myriad is intentionally not part of account-linking; it remains a wallet-call/user-signed venue.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-venue-account
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
        "200": { $ref: "#/components/responses/UserVenueAccountSetupBatch" }
        "401": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /user/venue-accounts/complete-batch:
    post:
      tags: [User]
      summary: Complete batch venue-account setup.
      description: Accepts signatures for setup requests returned by setup-batch and returns the refreshed safe batch state. Predict.fun signatures are exchanged server-side for temporary Predict auth only. Limitless signatures are used server-side only to create a partner account. Opinion signatures submit the user-signed Safe enable-trading transaction. Provider tokens, raw signatures, and auth material are never stored or returned.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-venue-account
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteUserVenueAccountSetupBatchRequest"
      responses:
        "200": { $ref: "#/components/responses/UserVenueAccountSetupBatch" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "502": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /user/venue-accounts/predict_fun/auth-message:
    post:
      tags: [User]
      summary: Prepare Predict.fun account auth message.
      description: Fetches Predict.fun's dynamic auth message for the user's active Turnkey EVM wallet. The frontend signs this message with Turnkey; Lotus does not sign, store signatures, return provider JWTs, or expose Predict API keys.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: user
      x-lotus-side-effects: user-venue-account
      x-lotus-danger: medium
      security: [{ bearerAuth: [] }]
      responses:
