      summary: Generate a new admin login key for a member. Owner-only; plaintext key is returned once.
      x-lotus-status: implemented
      x-lotus-callable: true
      x-lotus-auth: admin-owner
      x-lotus-side-effects: creates-admin-key
      x-lotus-danger: critical
      security: [{ bearerAuth: [] }]
